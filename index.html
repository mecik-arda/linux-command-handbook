<head>

    <title>Linux Komut El Kitabı</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
body { background-color: #0a0a0f; color: #e5e7eb; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; position: relative; }
body.theme-light { background-color: #f5f3ff; color: #1e1b4b; }
h1, h2, h3, h4, h5, h6 { font-family: 'Syne', sans-serif; }
code, pre { font-family: 'JetBrains Mono', monospace; }
#bg-mesh { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%); animation: mesh 20s infinite alternate; }
body.theme-light #bg-mesh { background: radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%); }
@keyframes mesh { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
#progress-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: linear-gradient(90deg, #7c3aed, #a855f7); z-index: 1000; transition: width 0.1s; }
nav { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(124, 58, 237, 0.2); z-index: 100; transition: all 0.3s; }
body.theme-light nav { background: rgba(245, 243, 255, 0.7); border-bottom: 1px solid rgba(124, 58, 237, 0.1); }
.nav-brand { font-size: 1.5rem; font-weight: 800; color: #a855f7; display: flex; align-items: center; gap: 0.5rem; font-family: 'Syne', sans-serif; }
.nav-actions { display: flex; align-items: center; gap: 1rem; }
button { background: none; border: none; cursor: pointer; color: inherit; transition: all 0.2s; font-family: inherit; }
.btn-icon { padding: 0.5rem; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; background: rgba(124, 58, 237, 0.1); }
.btn-icon:hover { background: rgba(124, 58, 237, 0.2); }
.search-container { position: relative; }
#search-input { padding: 0.5rem 1rem 0.5rem 2.5rem; border-radius: 0.5rem; border: 1px solid rgba(124, 58, 237, 0.3); background: rgba(10, 10, 15, 0.5); color: #fff; width: 250px; outline: none; transition: all 0.2s; font-family: inherit; }
body.theme-light #search-input { background: rgba(255, 255, 255, 0.5); color: #000; }
#search-input:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2); width: 300px; }
.search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); opacity: 0.5; }
main { display: flex; max-width: 1400px; margin: 0 auto; padding: 2rem; gap: 2rem; min-height: 80vh; }
aside { width: 250px; flex-shrink: 0; }
.category-list { position: sticky; top: 100px; display: flex; flex-direction: column; gap: 0.5rem; }
.category-btn { text-align: left; padding: 0.75rem 1rem; border-radius: 0.5rem; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
.category-btn:hover, .category-btn.active { background: rgba(124, 58, 237, 0.1); color: #a855f7; }
.badge { background: rgba(124, 58, 237, 0.2); padding: 0.1rem 0.4rem; border-radius: 1rem; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
.content { flex-grow: 1; }
.category-section { margin-bottom: 4rem; scroll-margin-top: 100px; }
.category-title { font-size: 2rem; margin-bottom: 1.5rem; color: #a855f7; border-bottom: 1px solid rgba(124, 58, 237, 0.2); padding-bottom: 0.5rem; font-family: 'Syne', sans-serif;}
.commands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.5rem; }
.command-card { background: rgba(30, 27, 75, 0.4); border: 1px solid rgba(124, 58, 237, 0.1); border-radius: 1rem; padding: 1.5rem; backdrop-filter: blur(10px); transition: all 0.3s; opacity: 0; transform: translateY(20px); display: flex; flex-direction: column; gap: 1rem; }
body.theme-light .command-card { background: rgba(255, 255, 255, 0.6); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
.command-card.visible { opacity: 1; transform: translateY(0); }
.command-card:hover { border-color: #a855f7; box-shadow: 0 0 15px rgba(124, 58, 237, 0.15); transform: translateY(-2px); }
.cmd-header { display: flex; align-items: baseline; gap: 1rem; }
.cmd-name { font-size: 1.25rem; color: #a855f7; background: rgba(124, 58, 237, 0.1); padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-family: 'JetBrains Mono', monospace;}
.cmd-desc { font-size: 0.95rem; opacity: 0.9; flex-grow: 1;}
.cmd-section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.5; margin-bottom: 0.5rem; font-weight: 700; }
.code-block { background: rgba(0, 0, 0, 0.5); padding: 1rem; border-radius: 0.5rem; position: relative; border: 1px solid rgba(255,255,255,0.05); }
body.theme-light .code-block { background: #1e1b4b; color: #e5e7eb; border: none; }
.code-block pre { overflow-x: auto; font-size: 0.85rem; padding-right: 2.5rem; color: #fff; }
body.theme-light .code-block pre { color: #fff; }
.copy-btn { position: absolute; right: 0.5rem; top: 0.5rem; background: rgba(255,255,255,0.1); padding: 0.25rem; border-radius: 0.25rem; opacity: 0; transition: opacity 0.2s; color: #fff; }
.code-block:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: rgba(255,255,255,0.2); }
.ex-list { display: flex; flex-direction: column; gap: 1rem; }
.ex-item-desc { font-size: 0.85rem; margin-bottom: 0.25rem; opacity: 0.8; }
.ex-item .code-block { padding: 0.75rem; }
.ex-item .code-block pre { font-size: 0.85rem; color: #a855f7; }
#no-results { display: none; text-align: center; padding: 4rem; font-size: 1.5rem; opacity: 0.5; grid-column: 1 / -1; font-family: 'Syne', sans-serif;}
#scroll-top { position: fixed; bottom: 2rem; right: 2rem; background: #a855f7; color: #fff; width: 3rem; height: 3rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4); opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 100; }
#scroll-top.visible { opacity: 1; pointer-events: auto; }
#scroll-top:hover { transform: translateY(-5px); background: #9333ea; }
.highlight { background: rgba(168, 85, 247, 0.4); color: inherit; padding: 0 0.2rem; border-radius: 0.2rem; }
.footer-banner { margin-top: 4rem; padding: 2rem; text-align: center; background: linear-gradient(to right, rgba(30, 27, 75, 0.8), rgba(10, 10, 15, 0.8)); border-top: 1px solid rgba(124, 58, 237, 0.2); backdrop-filter: blur(10px); }
body.theme-light .footer-banner { background: linear-gradient(to right, rgba(245, 243, 255, 0.8), #fff); }
.credit-link { display: inline-flex; align-items: center; gap: 0.5rem; color: #a855f7; text-decoration: none; font-weight: 700; font-size: 1.2rem; padding: 1rem 2rem; border-radius: 2rem; background: rgba(124, 58, 237, 0.1); transition: all 0.3s; font-family: 'Syne', sans-serif;}
.credit-link:hover { background: #a855f7; color: #fff; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
.credit-card { text-align: center; padding: 3rem; background: rgba(30, 27, 75, 0.2); border-radius: 1rem; border: 1px solid rgba(124, 58, 237, 0.2); margin-top: 4rem; backdrop-filter: blur(10px); }
body.theme-light .credit-card { background: rgba(255, 255, 255, 0.6); }
.credit-card h2 { margin-bottom: 1.5rem; color: #a855f7; font-size: 2rem; }
@media (max-width: 1024px) { main { flex-direction: column; } aside { width: 100%; } .category-list { position: static; flex-direction: row; flex-wrap: wrap; } .category-btn { flex-basis: calc(50% - 0.5rem); } .commands-grid { grid-template-columns: 1fr; } #search-input { width: 200px; } #search-input:focus { width: 250px; } }
@media (max-width: 768px) { nav { flex-direction: column; gap: 1rem; padding: 1rem; } .nav-actions { width: 100%; justify-content: space-between; flex-wrap: wrap; } .search-container { flex-grow: 1; margin-right: 0; width: 100%; order: 3; } #search-input { width: 100%; } #search-input:focus { width: 100%; } .category-btn { flex-basis: 100%; } }
</style>
</head>

x":"patch [options] [originalfile [patchfile]]","ex":[{"c":"patch < fix.diff","tr":"Yamayı uygula","en":"Apply patch"}]},{"name":"paste","tr":"Dosyaların satırlarını birleştirir.","en":"Merge lines of files.","syntax":"paste [OPTION]... [FILE]...","ex":[{"c":"paste file1.txt file2.txt","tr":"Satırları yan yana birleştir","en":"Merge lines side by side"}]},{"name":"join","tr":"Ortak bir alana sahip iki dosyanın satırlarını birleştirir.","en":"Join lines of two files on a common field.","syntax":"join [OPTION]... FILE1 FILE2","ex":[{"c":"join file1.txt file2.txt","tr":"Ortak sütuna göre birleştir","en":"Join by common column"}]},{"name":"nl","tr":"Satır numaralarını ekler.","en":"Number lines of files.","syntax":"nl [OPTION]... [FILE]...","ex":[{"c":"nl file.txt","tr":"Satır numaraları ile yazdır","en":"Print with line numbers"}]},{"name":"zcat","tr":"Sıkıştırılmış dosyaların içeriğini gösterir.","en":"View contents of compressed files.","syntax":"zcat [ -S suffix ] [ name ...  ]","ex":[{"c":"zcat file.gz","tr":"Sıkıştırılmış dosya içeriğini gör","en":"View compressed file content"}]},{"name":"zgrep","tr":"Sıkıştırılmış dosyalarda metin arar.","en":"Search possibly compressed files for a regular expression.","syntax":"zgrep [ grep_options ] [ -e ] pattern filename...","ex":[{"c":"zgrep 'error' log.gz","tr":"Gz dosyasında error kelimesini ara","en":"Search for error in gz file"}]}]},{"cat":"processManagement","cmds":[{"name":"ps","tr":"Mevcut süreçlerin durumunu raporlar.","en":"Report a snapshot of the current processes.","syntax":"ps [options]","ex":[{"c":"ps aux","tr":"Tüm süreçleri listele","en":"List all processes"}]},{"name":"top","tr":"Linux görevlerini görüntüler.","en":"Display Linux tasks.","syntax":"top","ex":[{"c":"top","tr":"Süreçleri canlı izle","en":"Watch processes live"}]},{"name":"htop","tr":"Etkileşimli süreç görüntüleyici.","en":"Interactive process viewer.","syntax":"htop","ex":[{"c":"htop","tr":"Renkli ve interaktif süreç izleyici","en":"Colorful ervice","tr":"Sistem servislerini çalıştırır.","en":"Run a System V init script.","syntax":"service SCRIPT COMMAND","ex":[{"c":"service apache2 start","tr":"Servisi başlat","en":"Start service"}]},{"name":"pstree","tr":"Süreçleri ağaç yapısında gösterir.","en":"Display a tree of processes.","syntax":"pstree [ -a ] [ -c ] [ -h ] [ -n ] [ -p ] [ -u ]","ex":[{"c":"pstree -p","tr":"Ağacı PID'leri ile göster","en":"Show tree with PIDs"}]},{"name":"lsof","tr":"Açık dosyaları listeler.","en":"List open files.","syntax":"lsof [ -?abChKlnNOPRtUvVX ] [ -A A ] [ -c c ] [ -+d d ] [ -+D D ]","ex":[{"c":"lsof -i :80","tr":"80 portunu kullanan süreçleri göster","en":"Show processes using port 80"}]},{"name":"strace","tr":"Sistem çağrılarını ve sinyallerini izler.","en":"Trace system calls and signals.","syntax":"strace [ -dffhiqrtttTvxx ] [ -a column ] [ -e expr ] ... [ -p pid ] ...","ex":[{"c":"strace -p 1234","tr":"1234 PID'li sürecin sistem çağrılarını izle","en":"Trace system calls of PID 1234"}]},{"name":"pidof","tr":"Çalışan bir programın süreç kimliğini (PID) bulur.","en":"Find the process ID of a running program.","syntax":"pidof [ -s ] [ -c ] [ -n ] [ -x ] [ -o omitpid ] [ -o omitpid..  ]  program","ex":[{"c":"pidof nginx","tr":"Nginx süreç kimliğini bul","en":"Find PID of nginx"}]},{"name":"pgrep","tr":"İsme göre süreçleri arar.","en":"Look up processes based on name and other attributes.","syntax":"pgrep [options] pattern","ex":[{"c":"pgrep -u root sshd","tr":"Root kullanıcısına ait sshd süreçlerini bul","en":"Find sshd processes of root user"}]},{"name":"pkill","tr":"İsme göre süreçlere sinyal gönderir.","en":"Signal processes based on name and other attributes.","syntax":"pkill [options] pattern","ex":[{"c":"pkill -9 nginx","tr":"Nginx süreçlerini zorla kapat","en":"Force kill nginx processes"}]}]},{"cat":"network","cmds":[{"name":"ping","tr":"Ağ ana bilgisayarına ICMP ECHO_REQUEST gönderir.","en":"Send ICMP ECHO_REQUEST to network hosts.","syntax":"ping [OPTION...] HOST","ex":[{"c":"ping google.com","tr":"Sunucuya ping at","en":"Ping server"}]},{"name":"curl","tr":"URL ile veri transferi yapar.","en":"Transfer a URL.","syntax":"curl [options...] <url>","ex":[{"c":"curl -O https://example.com/file.zip","tr":"Dosya indir","en":"Download file"},{"c":"curl -I https://example.com","tr":"HTTP başlıklarını getir","en":"Fetch HTTP headers"}]},{"name":"wget","tr":"Dosyaları ağdan indirir.","en":"The non-interactive network downloader.","syntax":"wget [option]... [URL]...","ex":[{"c":"wget https://example.com/file.iso","tr":"Dosya indir","en":"Download file"}]},{"name":"netstat","tr":"Ağ bağlantılarını, yönlendirme tablolarını vb. yazdırır.","en":"Print network connections, routing tables, etc.","syntax":"netstat [address_family_options] [--tcp|-t]","ex":[{"c":"netstat -tuln","tr":"Dinlenen portları göster","en":"Show listening ports"}]},{"name":"ss","tr":"Soketleri araştırmak için araç.","en":"Another utility to investigate sockets.","syntax":"ss [options]","ex":[{"c":"ss -tuln","tr":"Açık portları ve dinleyen servisleri listele","en":"List open ports and listening services"}]},{"name":"ifconfig","tr":"Bir ağ arayüzünü yapılandırır.","en":"Configure a network interface.","syntax":"ifconfig [-v] [-a] [-s] [interface]","ex":[{"c":"ifconfig","tr":"Ağ arayüzlerini listele","en":"List network interfaces"}]},{"name":"ip","tr":"Yönlendirme, ağ cihazları ve tünelleri gösterir / değiştirir.","en":"Show / manipulate routing, network devices, and tunnels.","syntax":"ip [ OPTIONS ] OBJECT { COMMAND | help }","ex":[{"c":"ip a","tr":"IP adreslerini göster","en":"Show IP addresses"}]},{"name":"nmap","tr":"Ağ keşfi ve güvenlik denetimi aracı.","en":"Network exploration tool and security / port scanner.","syntax":"nmap [Scan Type(s)] [Options] {target specification}","ex":[{"c":"nmap -p- localhost","tr":"Tüm portları tara","en":"Scan all ports"}]},{"name":"ssh","tr":"Uzak makineye giriş programı (SSH istemcisi).","en":"OpenSSH remote login client.","syntax":"ssh [options] destination [command]","ex":[{"c":"ssh user@host","tr":"Sunucuya bağlan","en":"Connect to server"}]},{"name":"scp","tr":"Ağdaki ana makineler arasında güvenli kopyalama.","en":"Secure copy (remote file copy program).","syntax":"scp [options] [[user@]host1:]file1 ... [[user@]host2:]file2","ex":[{"c":"scp file.txt user@host:/path","tr":"Dosyayı sunucuya kopyala","en":"Copy file to server"}]},{"name":"rsync","tr":"Hızlı ve çok yönlü dosya kopyalama aracı.","en":"A fast, versatile, remote (and local) file-copying tool.","syntax":"rsync [OPTION...] SRC... [DEST]","ex":[{"c":"rsync -avz folder/ user@host:/path","tr":"Klasörü sunucuyla senkronize et","en":"Sync folder to server"}]},{"name":"traceroute","tr":"Ağ paketinin yolunu izler.","en":"Print the route packets trace to network host.","syntax":"traceroute [options] host [packetsize]","ex":[{"c":"traceroute google.com","tr":"Paket rotasını göster","en":"Show packet route"}]},{"name":"dig","tr":"DNS aracı.","en":"DNS lookup utility.","syntax":"dig [@server] [name] [type]","ex":[{"c":"dig example.com","tr":"DNS kayıtlarını sorgula","en":"Query DNS records"}]},{"name":"nslookup","tr":"İnternet isim sunucularını etkileşimli sorgular.","en":"Query Internet name servers interactively.","syntax":"nslookup [name] [server]","ex":[{"c":"nslookup example.com","tr":"Alan adı IP adresini bul","en":"Find domain IP address"}]},{"name":"route","tr":"IP yönlendirme tablosunu gösterir veya değiştirir.","en":"Show / manipulate the IP routing table.","syntax":"route [options]","ex":[{"c":"route -n","tr":"Yönlendirme tablosunu sayısal göster","en":"Show routing table numerically"}]},{"name":"nc","tr":"Ağ bağlantıları için genel amaçlı araç (netcat).","en":"Arbitrary TCP and UDP connections and listens.","syntax":"nc [options] [hostname] [port]","ex":[{"c":"nc -vz localhost 80","tr":"Portun açık olup olmadığını kontrol et","en":"Check if port is open"}]},{"name":"tcpdump","tr":"Ağdaki trafik paketlerini yakalar ve inceler.","en":"Dump traffic on a network.","syntax":"tcpdump [options]","ex":[{"c":"sudo tcpdump -i eth0","tr":"eth0 arayüzündeki trafiği dinle","en":"Listen to traffic on eth0"}]},{"name":"mtr","tr":"Ağ tanılama aracı (ping ve traceroute birleşimi).","en":"A network diagnostic tool.","syntax":"mtr [options] hostname","ex":[{"c":"mtr google.com","tr":"Sürekli izleme yap","en":"Continuous network trace"}]},{"name":"whois","tr":"Alan adı veya IP adresi sahiplik bilgilerini sorgular.","en":"Client for the whois directory service.","syntax":"whois [options] object","ex":[{"c":"whois example.com","tr":"Alan adı kütük bilgilerini getir","en":"Get domain registry info"}]}]},{"cat":"packageManagement","cmds":[{"name":"apt","tr":"Komut satırı paket yöneticisi.","en":"Command-line package manager.","syntax":"apt [options] command","ex":[{"c":"apt update && apt upgrade","tr":"Sistemi güncelle","en":"Update system"},{"c":"apt install nginx","tr":"Paket yükle","en":"Install package"}]},{"name":"apt-get","tr":"APT paket yönetimi aracı.","en":"APT package handling utility.","syntax":"apt-get [options] command","ex":[{"c":"apt-get install curl","tr":"Paket yükle","en":"Install package"}]},{"name":"dpkg","tr":"Debian paket yöneticisi.","en":"Package manager for Debian.","syntax":"dpkg [option...] action","ex":[{"c":"dpkg -i package.deb","tr":"Deb paketi kur","en":"Install deb package"}]},{"name":"snap","tr":"Snap paketlerini yönetir.","en":"Tool to interact with snaps.","syntax":"snap [OPTIONS] <command>","ex":[{"c":"snap install vlc","tr":"Snap paketi yükle","en":"Install snap package"}]},{"name":"yum","tr":"Etkileşimli rpm paket yöneticisi.","en":"Yellowdog Updater Modified.","syntax":"yum [options] [command] [package ...]","ex":[{"c":"yum install git","tr":"Paket yükle","en":"Install package"}]},{"name":"dnf","tr":"RPM tabanlı sistemler için paket yöneticisi.","en":"DNF Package Manager.","syntax":"dnf [options] <command> [<args>...]","ex":[{"c":"dnf install htop","tr":"Paket yükle","en":"Install package"}]},{"name":"rpm","tr":"RPM Paket Yöneticisi.","en":"RPM Package Manager.","syntax":"rpm [OPTION...] [FILE]","ex":[{"c":"rpm -ivh package.rpm","tr":"RPM paketi kur","en":"Install RPM package"}]},{"name":"pacman","tr":"Arch Linux paket yöneticisi.","en":"Arch Linux package manager.","syntax":"pacman <operation> [options] [targets]","ex":[{"c":"pacman -Syu","tr":"Sistemi güncelle","en":"Update system"}]},{"name":"zypper","tr":"openSUSE paket yöneticisi.","en":"Command-line interface to ZYpp system management library (openSUSE).","syntax":"zypper [global-options] command [command-options] [arguments]","ex":[{"c":"zypper install nano","tr":"Paket yükle","en":"Install package"}]},{"name":"emerge","tr":"Gentoo paket yöneticisi.","en":"Command-line interface to the Portage system.","syntax":"emerge [options] [action] [ebuild | tbz2file | file | @set | atom] ...","ex":[{"c":"emerge --sync","tr":"Paket ağacını senkronize et","en":"Sync package tree"}]},{"name":"flatpak","tr":"Uygulamaları kurun ve yönetin.","en":"Build, install and run applications and runtimes.","syntax":"flatpak [OPTION…] COMMAND","ex":[{"c":"flatpak install flathub org.gimp.GIMP","tr":"Flatpak uygulaması yükle","en":"Install flatpak app"}]},{"name":"apk","tr":"Alpine Linux paket yöneticisi.","en":"Alpine Package Keeper.","syntax":"apk [<OPTIONS>...] COMMAND [<ARGUMENTS>...]","ex":[{"c":"apk add curl","tr":"Paket ekle","en":"Add package"}]}]},{"cat":"userManagement","cmds":[{"name":"useradd","tr":"Yeni kullanıcı oluşturur.","en":"Create a new user.","syntax":"useradd [options] LOGIN","ex":[{"c":"useradd -m newuser","tr":"Ev dizini ile kullanıcı oluştur","en":"Create user with home directory"}]},{"name":"usermod","tr":"Kullanıcı hesabını değiştirir.","en":"Modify a user account.","syntax":"usermod [options] LOGIN","ex":[{"c":"usermod -aG sudo user","tr":"Kullanıcıyı sudo grubuna ekle","en":"Add user to sudo group"}]},{"name":"userdel","tr":"Kullanıcı hesabını ve ilgili dosyaları siler.","  shortcut"}]},{"name":"history","tr":"Komut geçmişini gösterir.","en":"Display or manipulate the history list.","syntax":"history","ex":[{"c":"history | grep 'ssh'","tr":"Geçmişte komut ara","en":"Search command in history"}]},{"name":"source","tr":"Bir dosyadan komut okur ve çalıştırır.","en":"Evaluate a file or resource as a Tcl script.","syntax":"source filename [arguments]","ex":[{"c":"source ~/.bashrc","tr":"Yapılandırmayı yeniden yükle","en":"Reload configuration"}]},{"name":"cron","tr":"Zamanlanmış görevleri çalıştıran servis.","en":"Daemon to execute scheduled commands (Vixie Cron).","syntax":"cron [-f] [-l] [-L loglevel]","ex":[{"c":"crontab -e","tr":"Zamanlanmış görevleri düzenle","en":"Edit scheduled tasks"}]},{"name":"at","tr":"Komutları daha sonra çalıştırmak için kuyruğa alır.","en":"Queue, examine or delete jobs for later execution.","syntax":"at [-V] [-q queue] [-f file] [-mMlv] timespec ...","ex":[{"c":"echo 'reboot' | at now + 1 hour","tr":"1 saat sonra yeniden başlat","en":"Reboot after 1 hour"}]},{"name":"xargs","tr":"Standart girdiden komutlar oluşturur ve çalıştırır.","en":"Build and execute command lines from standard input.","syntax":"xargs [options] [command [initial-arguments]]","ex":[{"c":"find . -name '*.bak' | xargs rm","tr":"Bulunan dosyaları sil","en":"Delete found files"}]},{"name":"tee","tr":"Standart girdiyi okur ve hem standart çıktıya hem dosyalara yazar.","en":"Read from standard input and write to standard output and files.","syntax":"tee [OPTION]... [FILE]...","ex":[{"c":"echo 'text' | tee file.txt","tr":"Ekrana ve dosyaya yazdır","en":"Print to screen and file"}]},{"name":"watch","tr":"Bir komutu periyodik olarak çalıştırıp çıktısını tam ekran gösterir.","en":"Execute a program periodically, showing output fullscreen.","syntax":"watch [options] command","ex":[{"c":"watch -n 1 free -m","tr":"Bellek kullanımını her saniye yenile","en":"Refresh memory usage every second"}]},{"name":"printf","tr":"Veriyi biçimlendirir ve yazdırır. let currentLang = 'tr';
let isDark = true;

const el = (id) => document.getElementById(id);
const q = (sel) => document.querySelector(sel);
const qa = (sel) => document.querySelectorAll(sel);

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>'"]/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
  }[char]));
}

function render() {
  const t = dict[currentLang];
  document.title = t.title;
  el('app-title').textContent = t.title;
  el('search-input').placeholder = t.search;
  el('no-results').textContent = t.noResults;
  el('footer-text').textContent = t.developedBy;
  el('about-title').textContent = t.about;
  el('about-text').textContent = t.developedBy;

  const aside = el('category-list');
  aside.innerHTML = '';
  db.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'category-btn';
    btn.dataset.target = 'sec-' + cat.cat;
    btn.innerHTML = '<span>' + t.cat[cat.cat] + '</span><span class="badge">' + cat.cmds.length + '</span>';
    btn.onclick = () => {
      const target = el('sec-' + cat.cat);
      if (target) {
        const offset = target.getBoundingClientRect().top + window.scrollY - 120;
        window.scrollTo({ top: offset, behavior: 'smooth' });
      }
    };
    aside.appendChild(btn);
  });

  const content = el('main-content');
  content.innerHTML = '';
  db.forEach(cat => {
    const sec = document.createElement('section');
    sec.className = 'category-section';
    sec.id = 'sec-' + cat.cat;
    
    const h2 = document.createElement('h2');
    h2.className = 'category-title';
    h2.textContent = t.cat[cat.cat];
    sec.appendChild(h2);

    const grid = document.createElement('div');
    grid.className = 'commands-grid';

    cat.cmds.forEach(cmd => {
      const card = document.createElement('article');
      card.className = 'command-card search-item';
      card.dataset.cmd = cmd.name.toLowerCase();
      card.dataset.desc = cmd[currentLang].toLowerCase();

      let exHtml = '';
      cmd.ex.forEach(ex => {
        exHtml += '<div class="ex-item"><div class="ex-item-desc">' + escapeHtml(ex[currentLang]) + '</div><div class="code-block"><button class="copy-btn" aria-label="' + t.copy + '" onclick="copyCode(this)">' + svgCopy + '</button><pre><code>' + escapeHtml(ex.c) + '</code></pre></div></div>';
      });

      card.innerHTML = '<div class="cmd-header"><h3 class="cmd-name"><code>' + escapeHtml(cmd.name) + '</code></h3><p class="cmd-desc">' + escapeHtml(cmd[currentLang]) + '</p></div><div class="cmd-body"><div class="cmd-section-title">' + t.syntax + '</div><div class="code-block"><button class="copy-btn" aria-label="' + t.copy + '" onclick="copyCode(this)">' + svgCopy + '</button><pre><code>' + escapeHtml(cmd.syntax) + '</code></pre></div></div><div class="cmd-examples"><div class="cmd-section-title">' + t.examples + '</div><div class="ex-list">' + exHtml + '</div></div>';
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    content.appendChild(sec);
  });

  setupObservers();
  filterCommands(el('search-input').value);
}

const svgCopy = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
const svgCheck = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

window.copyCode = function(btn) {
  const code = btn.nextElementSibling.textContent;
  navigator.clipboard.writeText(code).then(() => {
    const original = btn.innerHTML;
    btn.innerHTML = svgCheck;
    setTimeout(() => { btn.innerHTML = original; }, 1500);
  });
};

function setupObservers() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  qa('.command-card').forEach(card => observer.observe(card));

  const secObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        qa('.category-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.target === entry.target.id);
        });
      }
    });
  }, { threshold: 0.2, rootMargin: '-100px 0px -60% 0px' });
  qa('.category-section').forEach(sec => secObserver.observe(sec));
}

function filterCommands(query) {
  query = query.toLowerCase();
  let foundAny = false;
  qa('.search-item').forEach(card => {
    const text = card.dataset.cmd + ' ' + card.dataset.desc;
    if (text.includes(query)) {
      card.style.display = 'flex';
      foundAny = true;
      if (query.length > 0) {
        highlightNode(card.querySelector('.cmd-name code'), query);
        highlightNode(card.querySelector('.cmd-desc'), query);
      } else {
        removeHighlight(card.querySelector('.cmd-name code'));
        removeHighlight(card.querySelector('.cmd-desc'));
      }
    } else {
      card.style.display = 'none';
    }
  });

  qa('.category-section').forEach(sec => {
    const visibleCards = sec.querySelectorAll('.search-item[style="display: flex;"]');
    sec.style.display = visibleCards.length > 0 ? 'block' : 'none';
  });

  el('no-results').style.display = foundAny ? 'none' : 'block';
}

function highlightNode(node, query) {
  removeHighlight(node);
  if (!query) return;
  const regex = new RegExp('(' + query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
  node.innerHTML = node.innerHTML.replace(regex, '<span class="highlight">$1</span>');
}

function removeHighlight(node) {
  node.innerHTML = node.innerHTML.replace(/<span class="highlight">(.*?)<\/span>/g, '$1');
}

el('search-input').addEventListener('input', (e) => filterCommands(e.target.value));

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey && e.key === 'k') || e.key === '/') {
    e.preventDefault();
    el('search-input').focus();
  }
});

el('lang-toggle').addEventListener('click', () => {
  currentLang = currentLang === 'tr' ? 'en' : 'tr';
  el('lang-text').textContent = currentLang.toUpperCase();
  render();
});

el('theme-toggle').addEventListener('click', () => {
  isDark = !isDark;
  document.body.className = isDark ? 'theme-dark' : 'theme-light';
  el('theme-icon').innerHTML = isDark 
    ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
});

window.addEventListener('scroll', () => {
  const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const scrolled = (winScroll / height) * 100;
  el('progress-bar').style.width = scrolled + '%';
  
  if (winScroll > 300) {
    el('scroll-top').classList.add('visible');
  } else {
    el('scroll-top').classList.remove('visible');
  }
});

el('scroll-top').addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

render();
</script>
</body>
</html>
